<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DataByteSprites: Data Discovery - VoltanLabs</title>
  <meta name="description" content="Scan codes and build your DataByteSprites collection." />
  <meta name="theme-color" content="#07111f" />
  <style>
    html,body{height:100%;margin:0;background:#07111f;color:white;overflow:hidden;overscroll-behavior:none;font-family:Roboto,system-ui,sans-serif}
    body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 40%,rgba(0,123,255,.22),transparent 35%),linear-gradient(rgba(0,123,255,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(0,123,255,.12) 1px,transparent 1px);background-size:100% 100%,22px 22px,22px 22px;pointer-events:none}
    .dd-boot{position:fixed;inset:0;display:grid;place-items:center;text-align:center;background:#07111f;z-index:1}
    .dd-boot-card{display:grid;gap:10px;padding:24px;border:1px solid rgba(125,211,252,.22);border-radius:28px;background:rgba(7,17,31,.72);box-shadow:0 0 80px rgba(0,123,255,.18)}
    .dd-boot-kicker{color:#FFD700;font-size:11px;font-weight:900;letter-spacing:.24em;text-transform:uppercase}
    .dd-boot-title{color:#007BFF;font-size:clamp(34px,10vw,64px);line-height:.9;font-weight:900}
    .dd-boot-sub{color:#BAE6FD;font-size:13px}
    .dd-boot-error{color:#FB7185;max-width:min(680px,86vw);font-size:12px;line-height:1.45;overflow-wrap:anywhere}
  </style>
</head>
<body>
  <div class="dd-boot" aria-hidden="true">
    <div class="dd-boot-card">
      <div class="dd-boot-kicker">Scanner OS Boot</div>
      <div class="dd-boot-title">Data Discovery</div>
      <div class="dd-boot-sub">Loading Phase 4.7 battle runtime...</div>
      <div id="ddBootError" class="dd-boot-error" hidden></div>
    </div>
  </div>

  <!-- Canonical Data Discovery runtime order.
       Keep this list synchronized with studio/runtime/load-order.json. -->

  <!-- Product roster and authored data -->
  <script src="/assets/js/dd-canon-roster.js?v=product-roster-1"></script>
  <script src="/assets/js/dd-studio-data-bridge.js?v=studio-bridge-3"></script>

  <!-- Status must exist before battle engine and resolver delegation -->
  <script src="/assets/js/dd-status-runtime.js?v=status-runtime-1-1-0"></script>

  <!-- Core gameplay -->
  <script src="/assets/js/dd-battle-engine-2-4.js?v=battle-engine-3-3-0"></script>
  <script src="/assets/js/dd-gameplay-rules-2-4.js?v=gameplay-rules-1"></script>
  <script src="/assets/js/dd-capture-runtime.js?v=capture-runtime-1"></script>
  <script src="/assets/js/dd-encounter-runtime.js?v=encounter-runtime-1"></script>
  <script src="/assets/js/dd-battle-balance-2-4.js?v=battle-balance-2"></script>
  <script src="/assets/js/dd-battle-resolver.js?v=battle-resolver-3-4-0"></script>

  <!-- Canonical battle state -->
  <script src="/assets/js/dd-battle-state-runtime.js?v=battle-state-runtime-0-7-0"></script>

  <!-- Persistent product state -->
  <script src="/assets/js/dd-collection-runtime.js?v=collection-runtime-1"></script>
  <script src="/assets/js/dd-party-runtime.js?v=party-runtime-1"></script>
  <script src="/assets/js/dd-party-switch-runtime.js?v=party-switch-runtime-1"></script>
  <script src="/assets/js/dd-inventory-runtime.js?v=inventory-runtime-1"></script>

  <!-- Terminal rewards must be installed before the app shell can start battles -->
  <script src="/assets/js/dd-battle-reward-runtime.js?v=battle-reward-runtime-1-0-0"></script>
  <script src="/assets/js/dd-battle-reward-presentation.js?v=battle-reward-presentation-1-0-0"></script>

  <!-- Battle and collection presentation observers -->
  <script src="/assets/js/dd-battle-presentation-runtime.js?v=battle-presentation-runtime-3"></script>
  <script src="/assets/js/dd-dex-runtime.js?v=dex-runtime-1"></script>
  <script src="/assets/js/dd-collection-dex-runtime-bridge.js?v=collection-dex-bridge-1"></script>

  <!-- Screen and control owners -->
  <script src="/assets/js/dd-layout-viewport-lock-4-2.js?v=layout-lock-4-2-1"></script>
  <script src="/assets/js/dd-scanner-screen.js?v=scanner-screen-owner-1"></script>
  <script src="/assets/js/dd-encounter-screen.js?v=encounter-screen-owner-1"></script>
  <script src="/assets/js/dd-battle-screen.js?v=battle-screen-owner-3"></script>
  <script src="/assets/js/dd-battle-controls.js?v=battle-controls-owner-3"></script>
  <script src="/assets/js/dd-confirm-screen.js?v=confirm-screen-owner-1"></script>
  <script src="/assets/js/dd-result-screen.js?v=result-screen-owner-1"></script>

  <!-- Active application shell -->
  <script src="/assets/js/databyte-discovery-product-app-v4-shell.js?v=v4-shell-4-7-0"></script>

  <!-- Post-shell behavior and compatibility adapters -->
  <script src="/assets/js/dd-scanner-behavior-4-3.js?v=behavior-4-3-1"></script>
  <script src="/assets/js/dd-party-switch-battle-bridge.js?v=party-switch-bridge-1"></script>
  <script src="/assets/js/dd-party-switch-ui.js?v=party-switch-ui-4"></script>
  <script src="/assets/js/dd-party-switch-refresh.js?v=party-switch-refresh-2"></script>

  <!-- Scanner OS and visual effects -->
  <script src="/assets/js/dd-scanner-os-runtime.js?v=scanner-os-runtime-4-3-2"></script>
  <script src="/assets/js/dd-battle-experience-4-2.js?v=battle-experience-4-4-1"></script>
  <script src="/assets/js/dd-health-signal-bridge.js?v=health-signal-1"></script>
  <script src="/assets/js/dd-scan-bg.js?v=0912-direct-os-2"></script>

  <!-- Runtime diagnostics -->
  <script src="/assets/js/studio-runtime-bridge-checks.js?v=bridge-checks-1-2-0"></script>

  <script>
    (function () {
      'use strict';

      var requiredGlobals = [
        'DD_CANON_ROSTER',
        'DD_STUDIO_DATA_BRIDGE',
        'DD_STATUS_RUNTIME',
        'DDBattle24',
        'DD_GAMEPLAY_RULES',
        'DD_CAPTURE_RUNTIME',
        'DD_ENCOUNTER_RUNTIME',
        'DD_BATTLE_BALANCE',
        'DD_BATTLE_RESOLVER',
        'DD_BATTLE_STATE_RUNTIME',
        'DD_BATTLE_REWARD_RUNTIME',
        'DD_BATTLE_REWARD_PRESENTATION',
        'DD_BATTLE_PRESENTATION_RUNTIME',
        'DD_COLLECTION_RUNTIME',
        'DD_PARTY_RUNTIME',
        'DD_INVENTORY_RUNTIME',
        'DD_DEX_RUNTIME',
        'DD_SCANNER_SCREEN',
        'DD_ENCOUNTER_SCREEN',
        'DD_BATTLE_SCREEN',
        'DD_BATTLE_CONTROLS',
        'DD_CONFIRM_SCREEN',
        'DD_RESULT_SCREEN',
        'DD_PRODUCT_APP_V4_SHELL'
      ];

      var missing = requiredGlobals.filter(function (name) {
        return !window[name];
      });

      if (!missing.length) {
        document.dispatchEvent(new CustomEvent('runtime:ready', {
          detail: {
            owner: 'databyte-discovery.html',
            phase: '4.7-canonical-resolution-and-throttled-diagnostics',
            requiredGlobals: requiredGlobals.slice(),
            at: new Date().toISOString()
          }
        }));
        return;
      }

      var error = document.getElementById('ddBootError');
      if (error) {
        error.hidden = false;
        error.textContent = 'Runtime failed to initialize. Missing: ' + missing.join(', ');
      }

      document.dispatchEvent(new CustomEvent('runtime:module-failed', {
        detail: {
          owner: 'databyte-discovery.html',
          phase: '4.7-canonical-resolution-and-throttled-diagnostics',
          missing: missing,
          at: new Date().toISOString()
        }
      }));

      console.error('[Data Discovery] Required runtime modules missing:', missing);
    })();
  </script>
</body>
</html>
