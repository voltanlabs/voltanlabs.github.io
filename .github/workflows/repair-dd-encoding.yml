name: Repair Data Discovery Encoding

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair-data-discovery-encoding-main
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check runtime builder syntax
        run: |
          node --check studio/tools/build-data-discovery-runtime.mjs

      - name: Repair shell text encoding
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const shellPath =
            'assets/js/databyte-discovery-product-app-v4-shell.js';

          let text = fs.readFileSync(shellPath, 'utf8');

          // Remove a UTF-8 BOM if one is present.
          text = text.replace(/^\uFEFF/, '');

          const replacements = new Map([
            ['Ã°Å¸â€œÂ¡', '📡'],
            ['Ã¢â€”â€¡', '◇'],
            ['Ã¢â‚¬Â¢', '•'],
            ['Ã¢â€“Â¸', '▸']
          ]);

          for (const [broken, repaired] of replacements) {
            text = text.split(broken).join(repaired);
          }

          const forbidden = [...replacements.keys()];
          const remaining = forbidden.filter(value => text.includes(value));

          if (remaining.length) {
            throw new Error(
              'Known encoding corruption remains in shell: ' +
              remaining.join(', ')
            );
          }

          fs.writeFileSync(shellPath, text, {
            encoding: 'utf8'
          });

          console.log('Checked and repaired:', shellPath);
          NODE

      - name: Rebuild generated runtime bundle
        run: |
          node studio/tools/build-data-discovery-runtime.mjs

      - name: Validate repaired files
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const files = [
            'assets/js/databyte-discovery-product-app-v4-shell.js',
            'assets/js/dd-runtime-bundle.js'
          ];

          const forbidden = [
            '\uFEFF',
            'Ã°Å¸â€œÂ¡',
            'Ã¢â€”â€¡',
            'Ã¢â‚¬Â¢',
            'Ã¢â€“Â¸'
          ];

          for (const file of files) {
            const text = fs.readFileSync(file, 'utf8');

            for (const value of forbidden) {
              if (text.includes(value)) {
                throw new Error(
                  `Encoding corruption remains in ${file}: ${value}`
                );
              }
            }
          }

          console.log('Encoding validation passed.');
          NODE

      - name: Show changed files
        run: |
          git status --short
          git diff --stat
          git diff --check

      - name: Commit repaired files
        shell: bash
        run: |
          if git diff --quiet -- \
            assets/js/databyte-discovery-product-app-v4-shell.js \
            assets/js/dd-runtime-bundle.js
          then
            echo "No encoding changes were needed."
            exit 0
          fi

          git add \
            assets/js/databyte-discovery-product-app-v4-shell.js \
            assets/js/dd-runtime-bundle.js

          git commit -m "fix(data-discovery): repair shell text encoding"
          git push origin main
