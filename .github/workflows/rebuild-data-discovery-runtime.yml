
name: Rebuild Data Discovery Runtime

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-data-discovery-runtime-main
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rebuild generated runtime bundle
        run: |
          node studio/tools/build-data-discovery-runtime.mjs

      - name: Validate rebuilt runtime
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const bootstrap = fs.readFileSync(
            'assets/js/dd-app-bootstrap.js',
            'utf8'
          );
          const shell = fs.readFileSync(
            'assets/js/databyte-discovery-product-app-v4-shell.js',
            'utf8'
          );
          const manifest = fs.readFileSync(
            'studio/runtime/load-order.json',
            'utf8'
          );
          const bundle = fs.readFileSync(
            'assets/js/dd-runtime-bundle.js',
            'utf8'
          );

          const shellVersion = 'progression-shell-4-10-5';

          const checks = [
            [bootstrap.includes(shellVersion),
              'Bootstrap does not reference shell 4.10.5.'],
            [manifest.includes(shellVersion),
              'Load-order manifest does not reference shell 4.10.5.'],
            [shell.includes("const VERSION='4.10.5';"),
              'Source shell version is not 4.10.5.'],
            [shell.includes("const PRODUCT_PHASE='6.0.5';"),
              'Source shell product phase is not 6.0.5.'],
            [shell.includes("'dd:shell-event'"),
              'Source shell is missing dd:shell-event.'],
            [!shell.includes('DD_BATTLE_RUNTIME'),
              'Source shell still references DD_BATTLE_RUNTIME.'],
            [bundle.includes("const VERSION='4.10.5';"),
              'Bundle does not contain shell version 4.10.5.'],
            [bundle.includes("const PRODUCT_PHASE='6.0.5';"),
              'Bundle does not contain product phase 6.0.5.'],
            [bundle.includes("'dd:shell-event'"),
              'Bundle is missing dd:shell-event.'],
            [!bundle.includes('DD_BATTLE_RUNTIME'),
              'Bundle still references DD_BATTLE_RUNTIME.']
          ];

          const failures = checks
            .filter(([ok]) => !ok)
            .map(([, message]) => message);

          if (failures.length) {
            throw new Error(
              'Runtime validation failed:\n- ' +
              failures.join('\n- ')
            );
          }

          console.log('Data Discovery runtime validation passed.');
          NODE

      - name: Show generated changes
        run: |
          git status --short
          git diff --stat
          git diff --check

      - name: Commit rebuilt bundle
        shell: bash
        run: |
          if git diff --quiet -- assets/js/dd-runtime-bundle.js
          then
            echo "Runtime bundle is already synchronized."
            exit 0
          fi

          git add assets/js/dd-runtime-bundle.js
          git commit -m "build(data-discovery): rebuild runtime bundle"
          git push origin main
