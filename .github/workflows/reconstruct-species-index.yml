name: Reconstruct DataByteSprites Species Index

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reconstruct-databytesprites-species-index-main
  cancel-in-progress: false

jobs:
  reconstruct-species-index:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check reconstructor syntax
        run: |
          node --check studio/tools/reconstruct-species-index.mjs

      - name: Reconstruct species index
        run: |
          node studio/tools/reconstruct-species-index.mjs

      - name: Validate reconstructed species index
        run: |
          node studio/tools/reconstruct-species-index.mjs --check

      - name: Verify generated changes
        shell: bash
        run: |
          git status --short
          git diff --stat
          git diff --check

          unexpected_files="$(
            git status --porcelain --untracked-files=all |
            sed -E 's/^.. //' |
            grep -v '^studio/databytesprites/species.json$' || true
          )"

          if [ -n "$unexpected_files" ]; then
            echo "Unexpected files changed during species reconstruction:"
            echo "$unexpected_files"
            exit 1
          fi

      - name: Commit reconstructed species index
        shell: bash
        run: |
          if git diff --quiet -- studio/databytesprites/species.json
          then
            echo "species.json is already current."
            exit 0
          fi

          git add studio/databytesprites/species.json
          git commit -m "build(databytesprites): reconstruct species index"
          git push origin main
