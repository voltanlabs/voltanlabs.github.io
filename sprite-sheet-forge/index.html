
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sprite Sheet Forge — VoltanLabs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>

<body class="min-h-screen bg-zinc-950 text-zinc-100">
  <div id="vl-header"></div>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="mb-5">
      <a href="/tools.html" class="text-sm text-emerald-300 hover:underline">← Back to Lab Tools</a>
      <h1 class="text-3xl font-semibold mt-2">Sprite Sheet Forge</h1>
      <p class="text-sm text-zinc-400 mt-2">
        Upload PNG frames, arrange them into a transparent sprite sheet, preview animation, and export game-ready assets.
      </p>
      <div id="statusText" class="text-sm text-zinc-400 mt-2">Ready.</div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
      <section class="lg:col-span-3 rounded-2xl border border-white/10 bg-black/30 p-4">
        <div class="rounded-2xl border border-white/10 bg-zinc-900 overflow-auto p-3">
          <canvas
            id="sheetCanvas"
            width="900"
            height="300"
            class="mx-auto rounded-2xl bg-transparent"
          ></canvas>
        </div>

        <div class="flex flex-wrap gap-2 mt-4">
          <label class="px-4 py-2 rounded-xl bg-emerald-400 text-zinc-950 font-semibold cursor-pointer">
            Upload Frames
            <input id="frameInput" type="file" accept="image/*" multiple class="hidden" />
          </label>

          <button id="exportSheetBtn" class="px-4 py-2 rounded-xl bg-zinc-50 text-zinc-950 font-semibold">
            Export Sheet PNG
          </button>

          <button id="exportJsonBtn" class="px-4 py-2 rounded-xl bg-sky-400 text-zinc-950 font-semibold">
            Export JSON
          </button>

          <button id="clearBtn" class="px-4 py-2 rounded-xl border border-red-400/30 bg-red-400/10 text-red-200">
            Clear
          </button>
        </div>

        <div class="mt-5 rounded-2xl border border-white/10 bg-zinc-950 p-4">
          <h2 class="font-semibold mb-3">Animation Preview</h2>
          <div class="flex flex-wrap items-center gap-3">
            <canvas id="previewCanvas" width="160" height="160" class="rounded-xl border border-white/10 bg-black"></canvas>

            <div class="space-y-3 min-w-[220px]">
              <div class="flex gap-2">
                <button id="playBtn" class="px-4 py-2 rounded-xl bg-emerald-400 text-zinc-950 font-semibold">
                  Play
                </button>
                <button id="stopBtn" class="px-4 py-2 rounded-xl border border-white/10 bg-white/5">
                  Stop
                </button>
              </div>

              <label class="block text-sm text-zinc-400">
                Speed
                <input id="speedInput" type="range" min="30" max="1000" value="120" class="w-full mt-1" />
                <span class="text-xs text-zinc-500"><span id="speedText">120</span> ms/frame</span>
              </label>
            </div>
          </div>
        </div>
      </section>

      <aside class="lg:col-span-1 rounded-2xl border border-white/10 bg-black/30 p-4 space-y-5">
        <section>
          <h2 class="font-semibold mb-3">Sheet Settings</h2>

          <div class="space-y-3 text-sm">
            <label class="block text-zinc-400">
              Layout
              <select id="layoutSelect" class="w-full mt-1 rounded-xl bg-zinc-950 border border-white/10 px-3 py-2 text-zinc-100">
                <option value="horizontal">Horizontal Strip</option>
                <option value="vertical">Vertical Strip</option>
                <option value="grid">Grid</option>
              </select>
            </label>

            <label class="block text-zinc-400">
              Columns
              <input id="columnsInput" type="number" min="1" value="4" class="w-full mt-1 rounded-xl bg-zinc-950 border border-white/10 px-3 py-2 text-zinc-100" />
            </label>

            <label class="block text-zinc-400">
              Padding
              <input id="paddingInput" type="number" min="0" value="0" class="w-full mt-1 rounded-xl bg-zinc-950 border border-white/10 px-3 py-2 text-zinc-100" />
            </label>

            <label class="block text-zinc-400">
              Spacing
              <input id="spacingInput" type="number" min="0" value="0" class="w-full mt-1 rounded-xl bg-zinc-950 border border-white/10 px-3 py-2 text-zinc-100" />
            </label>

            <label class="block text-zinc-400">
              Frame Width
              <input id="frameWidthInput" type="number" min="1" value="0" class="w-full mt-1 rounded-xl bg-zinc-950 border border-white/10 px-3 py-2 text-zinc-100" />
              <span class="text-xs text-zinc-500">0 = auto</span>
            </label>

            <label class="block text-zinc-400">
              Frame Height
              <input id="frameHeightInput" type="number" min="1" value="0" class="w-full mt-1 rounded-xl bg-zinc-950 border border-white/10 px-3 py-2 text-zinc-100" />
              <span class="text-xs text-zinc-500">0 = auto</span>
            </label>
          </div>
        </section>

        <section class="border-t border-white/10 pt-4">
          <h3 class="font-semibold mb-2">Frames</h3>
          <div id="frameList" class="space-y-2 max-h-80 overflow-auto"></div>
        </section>
      </aside>
    </div>
  </main>

  <div id="vl-footer"></div>
  <script src="/assets/includes.js"></script>

  <script>
    const frameInput = document.getElementById("frameInput");
    const sheetCanvas = document.getElementById("sheetCanvas");
    const sheetCtx = sheetCanvas.getContext("2d");
    const previewCanvas = document.getElementById("previewCanvas");
    const previewCtx = previewCanvas.getContext("2d");

    const statusText = document.getElementById("statusText");
    const frameList = document.getElementById("frameList");

    const layoutSelect = document.getElementById("layoutSelect");
    const columnsInput = document.getElementById("columnsInput");
    const paddingInput = document.getElementById("paddingInput");
    const spacingInput = document.getElementById("spacingInput");
    const frameWidthInput = document.getElementById("frameWidthInput");
    const frameHeightInput = document.getElementById("frameHeightInput");

    const exportSheetBtn = document.getElementById("exportSheetBtn");
    const exportJsonBtn = document.getElementById("exportJsonBtn");
    const clearBtn = document.getElementById("clearBtn");

    const playBtn = document.getElementById("playBtn");
    const stopBtn = document.getElementById("stopBtn");
    const speedInput = document.getElementById("speedInput");
    const speedText = document.getElementById("speedText");

    let frames = [];
    let sheetMeta = [];
    let playing = false;
    let playIndex = 0;
    let playTimer = null;

    const setStatus = (msg) => statusText.textContent = msg;

    const loadImageFromFile = (file) => {
      return new Promise((resolve) => {
        const url = URL.createObjectURL(file);
        const img = new Image();

        img.onload = () => {
          resolve({
            name: file.name,
            img,
            url,
            w: img.naturalWidth || img.width,
            h: img.naturalHeight || img.height,
          });
        };

        img.onerror = () => {
          URL.revokeObjectURL(url);
          resolve(null);
        };

        img.src = url;
      });
    };

    const getSettings = () => {
      const autoW = frames.length ? Math.max(...frames.map((f) => f.w)) : 64;
      const autoH = frames.length ? Math.max(...frames.map((f) => f.h)) : 64;

      return {
        layout: layoutSelect.value,
        columns: Math.max(1, parseInt(columnsInput.value, 10) || 1),
        padding: Math.max(0, parseInt(paddingInput.value, 10) || 0),
        spacing: Math.max(0, parseInt(spacingInput.value, 10) || 0),
        frameW: Math.max(1, parseInt(frameWidthInput.value, 10) || autoW),
        frameH: Math.max(1, parseInt(frameHeightInput.value, 10) || autoH),
      };
    };

    const renderFrameList = () => {
      frameList.innerHTML = "";

      frames.forEach((frame, idx) => {
        const row = document.createElement("div");
        row.className = "rounded-xl border border-white/10 bg-zinc-950 p-2 flex items-center gap-2";

        const img = document.createElement("img");
        img.src = frame.url;
        img.className = "w-10 h-10 object-contain rounded-lg bg-black border border-white/10";

        const name = document.createElement("div");
        name.className = "flex-1 min-w-0";
        name.innerHTML = `
          <div class="text-xs text-zinc-200 truncate">${idx + 1}. ${frame.name}</div>
          <div class="text-[11px] text-zinc-500">${frame.w}×${frame.h}</div>
        `;

        const del = document.createElement("button");
        del.type = "button";
        del.className = "text-xs text-red-300 px-2 py-1 rounded-lg border border-red-400/30 bg-red-400/10";
        del.textContent = "✕";
        del.addEventListener("click", () => {
          URL.revokeObjectURL(frame.url);
          frames.splice(idx, 1);
          drawSheet();
          renderFrameList();
          drawPreviewFrame(0);
          setStatus("Frame removed.");
        });

        row.appendChild(img);
        row.appendChild(name);
        row.appendChild(del);
        frameList.appendChild(row);
      });
    };

    const drawSheet = () => {
      const s = getSettings();
      sheetMeta = [];

      let cols;
      let rows;

      if (s.layout === "horizontal") {
        cols = frames.length || 1;
        rows = 1;
      } else if (s.layout === "vertical") {
        cols = 1;
        rows = frames.length || 1;
      } else {
        cols = Math.min(s.columns, frames.length || 1);
        rows = Math.ceil((frames.length || 1) / cols);
      }

      const width = s.padding * 2 + cols * s.frameW + Math.max(0, cols - 1) * s.spacing;
      const height = s.padding * 2 + rows * s.frameH + Math.max(0, rows - 1) * s.spacing;

      sheetCanvas.width = width;
      sheetCanvas.height = height;
      sheetCtx.clearRect(0, 0, width, height);

      frames.forEach((frame, idx) => {
        const col = idx % cols;
        const row = Math.floor(idx / cols);
        const x = s.padding + col * (s.frameW + s.spacing);
        const y = s.padding + row * (s.frameH + s.spacing);

        const scale = Math.min(s.frameW / frame.w, s.frameH / frame.h);
        const dw = Math.round(frame.w * scale);
        const dh = Math.round(frame.h * scale);
        const dx = x + Math.round((s.frameW - dw) / 2);
        const dy = y + Math.round((s.frameH - dh) / 2);

        sheetCtx.drawImage(frame.img, dx, dy, dw, dh);

        sheetMeta.push({
          name: frame.name,
          index: idx,
          x,
          y,
          w: s.frameW,
          h: s.frameH,
          drawX: dx,
          drawY: dy,
          drawW: dw,
          drawH: dh,
        });
      });

      setStatus(`${frames.length} frame(s), sheet ${width}×${height}.`);
    };

    const drawPreviewFrame = (idx) => {
      previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);

      const frame = frames[idx];
      if (!frame) return;

      const scale = Math.min(previewCanvas.width / frame.w, previewCanvas.height / frame.h);
      const w = frame.w * scale;
      const h = frame.h * scale;
      const x = (previewCanvas.width - w) / 2;
      const y = (previewCanvas.height - h) / 2;

      previewCtx.drawImage(frame.img, x, y, w, h);
    };

    const playLoop = () => {
      if (!playing || !frames.length) return;

      drawPreviewFrame(playIndex);
      playIndex = (playIndex + 1) % frames.length;

      playTimer = setTimeout(playLoop, Number(speedInput.value));
    };

    frameInput.addEventListener("change", async () => {
      const files = Array.from(frameInput.files || []).filter((file) =>
        (file.type || "").startsWith("image/")
      );

      for (const file of files) {
        const frame = await loadImageFromFile(file);
        if (frame) frames.push(frame);
      }

      frameInput.value = "";
      renderFrameList();
      drawSheet();
      drawPreviewFrame(0);
      setStatus(`Loaded ${files.length} frame(s).`);
    });

    [layoutSelect, columnsInput, paddingInput, spacingInput, frameWidthInput, frameHeightInput].forEach((el) => {
      el.addEventListener("input", drawSheet);
      el.addEventListener("change", drawSheet);
    });

    exportSheetBtn.addEventListener("click", () => {
      if (!frames.length) {
        setStatus("Upload frames first.");
        return;
      }

      drawSheet();

      const a = document.createElement("a");
      a.href = sheetCanvas.toDataURL("image/png");
      a.download = "databyte-sprite-sheet.png";
      a.click();

      setStatus("Sprite sheet exported.");
    });

    exportJsonBtn.addEventListener("click", () => {
      if (!frames.length) {
        setStatus("Upload frames first.");
        return;
      }

      drawSheet();

      const data = {
        app: "VoltanLabs Sprite Sheet Forge",
        version: 1,
        image: "databyte-sprite-sheet.png",
        frameCount: frames.length,
        frames: sheetMeta,
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "databyte-sprite-sheet.json";
      a.click();

      URL.revokeObjectURL(url);
      setStatus("JSON exported.");
    });

    clearBtn.addEventListener("click", () => {
      frames.forEach((f) => URL.revokeObjectURL(f.url));
      frames = [];
      sheetMeta = [];
      renderFrameList();
      drawSheet();
      previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
      setStatus("Cleared.");
    });

    playBtn.addEventListener("click", () => {
      if (!frames.length) {
        setStatus("Upload frames first.");
        return;
      }

      playing = true;
      playIndex = 0;

      if (playTimer) clearTimeout(playTimer);
      playLoop();
    });

    stopBtn.addEventListener("click", () => {
      playing = false;
      if (playTimer) clearTimeout(playTimer);
      playTimer = null;
      setStatus("Preview stopped.");
    });

    speedInput.addEventListener("input", () => {
      speedText.textContent = speedInput.value;
    });

    drawSheet();
    setStatus("Ready.");
  </script>
</body>
</html>
