<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Character Forge 2D — VoltanLabs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    canvas { display:block; max-width:100%; height:auto; }
  </style>
</head>

<body class="min-h-screen bg-zinc-950 text-zinc-100">
  <div id="vl-header"></div>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="mb-5">
      <a href="./index.html" class="text-sm text-emerald-300 hover:underline">← Back to Character Forge</a>
      <h1 class="text-3xl font-semibold mt-2">Character Forge 2D</h1>
      <p class="text-sm text-zinc-400 mt-2">
        Build sprite parts, save poses, preview motion with onion skin, export PNG frames, then animate them in Gif Forge.
      </p>
      <div id="statusText" class="text-sm text-zinc-400 mt-2">Idle.</div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
      <section class="lg:col-span-3 rounded-2xl border border-white/10 bg-black/30 p-4">
        <div class="rounded-2xl border border-white/10 bg-zinc-900 overflow-auto">
          <canvas
            id="forgeCanvas"
            width="900"
            height="900"
            class="bg-transparent mx-auto w-full max-w-[900px] h-auto touch-none rounded-2xl"
          ></canvas>
        </div>

        <div class="flex flex-wrap gap-2 mt-4">
          <label class="px-4 py-2 rounded-xl bg-emerald-400 text-zinc-950 font-semibold cursor-pointer">
            Upload Parts
            <input id="partInput" type="file" accept="image/*" multiple class="hidden" />
          </label>

          <button id="exportBtn" class="px-4 py-2 rounded-xl bg-zinc-50 text-zinc-950 font-semibold">
            Export Current PNG
          </button>

          <button id="saveProjectBtn" class="px-4 py-2 rounded-xl bg-sky-400 text-zinc-950 font-semibold">
            Save Project
          </button>

          <label class="px-4 py-2 rounded-xl bg-purple-400 text-zinc-950 font-semibold cursor-pointer">
            Load Project
            <input id="loadProjectInput" type="file" accept=".json,application/json" class="hidden" />
          </label>

          <button id="centerBtn" class="px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">
            Center Selected
          </button>

          <button id="deleteBtn" class="px-4 py-2 rounded-xl border border-red-400/30 bg-red-400/10 text-red-200 hover:bg-red-400/20">
            Delete Selected
          </button>

          <button id="clearBtn" class="px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">
            Clear All
          </button>
        </div>
      </section>

      <aside class="lg:col-span-1 rounded-2xl border border-white/10 bg-black/30 p-4 space-y-5">
        <section>
          <h2 class="font-semibold mb-3">Selected Layer</h2>

          <div class="space-y-3 text-sm">
            <label class="block text-zinc-400">
              Scale
              <input id="scaleInput" type="range" min="10" max="300" value="100" class="w-full mt-1" />
            </label>

            <label class="block text-zinc-400">
              Rotate
              <input id="rotateInput" type="range" min="-180" max="180" value="0" class="w-full mt-1" />
            </label>

            <div class="grid grid-cols-2 gap-2">
              <button id="flipBtn" class="px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">Flip</button>
              <button id="resetBtn" class="px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">Reset</button>
            </div>

            <div class="grid grid-cols-2 gap-2">
              <button id="frontBtn" class="px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">Front</button>
              <button id="backBtn" class="px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">Back</button>
            </div>
          </div>
        </section>

        <section class="border-t border-white/10 pt-4">
          <h3 class="font-semibold mb-2">Pose Frames</h3>

          <label class="flex items-center justify-between gap-2 text-xs text-zinc-300 rounded-xl border border-white/10 bg-zinc-950 px-3 py-2 mb-3">
            <span>Onion Skin</span>
            <input id="onionToggle" type="checkbox" class="accent-emerald-400" />
          </label>

          <label class="block text-xs text-zinc-400 mb-3">
            Onion Opacity
            <input id="onionOpacity" type="range" min="5" max="70" value="25" class="w-full mt-1" />
          </label>

          <div class="grid grid-cols-2 gap-2 mb-3">
            <button id="savePoseBtn" class="px-3 py-2 rounded-xl bg-emerald-400 text-zinc-950 font-semibold text-sm">
              Save Pose
            </button>
            <button id="exportAllPosesBtn" class="px-3 py-2 rounded-xl bg-zinc-50 text-zinc-950 font-semibold text-sm">
              Export All
            </button>
          </div>

          <div id="poseList" class="space-y-2 max-h-64 overflow-auto"></div>
        </section>

        <section class="border-t border-white/10 pt-4">
          <h3 class="font-semibold mb-2">Layers</h3>
          <div id="layerList" class="space-y-2 max-h-64 overflow-auto"></div>
        </section>
      </aside>
    </div>
  </main>

  <div id="vl-footer"></div>
  <script src="/assets/includes.js"></script>

  <script>
    const canvas = document.getElementById("forgeCanvas");
    const ctx = canvas.getContext("2d");

    const partInput = document.getElementById("partInput");
    const loadProjectInput = document.getElementById("loadProjectInput");
    const layerList = document.getElementById("layerList");
    const poseList = document.getElementById("poseList");
    const statusText = document.getElementById("statusText");

    const scaleInput = document.getElementById("scaleInput");
    const rotateInput = document.getElementById("rotateInput");
    const onionToggle = document.getElementById("onionToggle");
    const onionOpacity = document.getElementById("onionOpacity");

    const exportBtn = document.getElementById("exportBtn");
    const saveProjectBtn = document.getElementById("saveProjectBtn");
    const savePoseBtn = document.getElementById("savePoseBtn");
    const exportAllPosesBtn = document.getElementById("exportAllPosesBtn");

    const centerBtn = document.getElementById("centerBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const clearBtn = document.getElementById("clearBtn");
    const flipBtn = document.getElementById("flipBtn");
    const resetBtn = document.getElementById("resetBtn");
    const frontBtn = document.getElementById("frontBtn");
    const backBtn = document.getElementById("backBtn");

    let layers = [];
    let poses = [];
    let selectedIndex = -1;
    let selectedPoseIndex = -1;
    let dragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let exportCounter = 1;

    const setStatus = (msg) => statusText.textContent = msg;
    const getSelected = () => selectedIndex >= 0 ? layers[selectedIndex] : null;

    const readFileAsDataURL = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error);
      reader.readAsDataURL(file);
    });

    const loadImageFromSrc = (src) => new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = src;
    });

    const downloadTextFile = (filename, text) => {
      const blob = new Blob([text], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    };

    const downloadDataURL = (filename, dataURL) => {
      const a = document.createElement("a");
      a.href = dataURL;
      a.download = filename;
      a.click();
    };

    const getLayerSnapshot = () => {
      return layers.map((layer) => ({
        name: layer.name,
        src: layer.src,
        x: layer.x,
        y: layer.y,
        w: layer.w,
        h: layer.h,
        scale: layer.scale,
        rotation: layer.rotation,
        flip: layer.flip,
      }));
    };

    const makeRenderableLayersFromSnapshot = async (snapshot) => {
      const restored = [];

      for (const item of snapshot || []) {
        const img = await loadImageFromSrc(item.src);
        if (!img) continue;

        restored.push({
          name: item.name || "layer.png",
          img,
          src: item.src,
          x: Number(item.x) || canvas.width / 2,
          y: Number(item.y) || canvas.height / 2,
          w: Number(item.w) || img.naturalWidth || img.width,
          h: Number(item.h) || img.naturalHeight || img.height,
          scale: Number(item.scale) || 1,
          rotation: Number(item.rotation) || 0,
          flip: !!item.flip,
        });
      }

      return restored;
    };

    const restoreLayersFromSnapshot = async (snapshot) => {
      layers = await makeRenderableLayersFromSnapshot(snapshot);
      selectedIndex = layers.length ? layers.length - 1 : -1;
    };

    const drawLayersToContext = (targetCtx, targetLayers, includeSelection = false) => {
      targetCtx.clearRect(0, 0, canvas.width, canvas.height);

      targetLayers.forEach((layer, idx) => {
        targetCtx.save();
        targetCtx.translate(layer.x, layer.y);
        targetCtx.rotate((layer.rotation * Math.PI) / 180);
        targetCtx.scale(layer.flip ? -layer.scale : layer.scale, layer.scale);
        targetCtx.drawImage(layer.img, -layer.w / 2, -layer.h / 2, layer.w, layer.h);
        targetCtx.restore();

        if (includeSelection && idx === selectedIndex) {
          targetCtx.save();
          targetCtx.strokeStyle = "#34d399";
          targetCtx.lineWidth = 3;
          targetCtx.setLineDash([8, 6]);
          targetCtx.strokeRect(
            layer.x - (layer.w * layer.scale) / 2,
            layer.y - (layer.h * layer.scale) / 2,
            layer.w * layer.scale,
            layer.h * layer.scale
          );
          targetCtx.restore();
        }
      });
    };

    const drawSnapshotGhost = async () => {
      if (!onionToggle.checked || selectedPoseIndex < 0 || !poses[selectedPoseIndex]) return;

      const ghostLayers = await makeRenderableLayersFromSnapshot(poses[selectedPoseIndex].layers);
      const alpha = Math.max(0.05, Math.min(0.7, Number(onionOpacity.value) / 100));

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.filter = "hue-rotate(150deg) saturate(1.5)";
      ghostLayers.forEach((layer) => {
        ctx.save();
        ctx.translate(layer.x, layer.y);
        ctx.rotate((layer.rotation * Math.PI) / 180);
        ctx.scale(layer.flip ? -layer.scale : layer.scale, layer.scale);
        ctx.drawImage(layer.img, -layer.w / 2, -layer.h / 2, layer.w, layer.h);
        ctx.restore();
      });
      ctx.restore();
    };

    let drawToken = 0;
    const draw = async () => {
      const token = ++drawToken;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (onionToggle.checked && selectedPoseIndex >= 0) {
        await drawSnapshotGhost();
        if (token !== drawToken) return;
      }

      drawLayersToContext(ctx, layers, true);
    };

    const syncControls = () => {
      const layer = getSelected();
      scaleInput.value = layer ? Math.round(layer.scale * 100) : 100;
      rotateInput.value = layer ? layer.rotation : 0;
    };

    const renderLayerList = () => {
      layerList.innerHTML = "";

      [...layers].reverse().forEach((layer, reverseIdx) => {
        const idx = layers.length - 1 - reverseIdx;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className =
          "w-full flex items-center gap-2 rounded-xl border px-2 py-2 text-left " +
          (idx === selectedIndex
            ? "border-emerald-400 bg-emerald-400/10"
            : "border-white/10 bg-zinc-950 hover:bg-zinc-900");

        const thumb = document.createElement("img");
        thumb.src = layer.src;
        thumb.className = "w-10 h-10 object-contain rounded-lg bg-black border border-white/10";

        const name = document.createElement("div");
        name.className = "text-xs text-zinc-300 truncate";
        name.textContent = layer.name;

        btn.appendChild(thumb);
        btn.appendChild(name);

        btn.addEventListener("click", () => {
          selectedIndex = idx;
          updateUI();
        });

        layerList.appendChild(btn);
      });
    };

    const createPoseThumbnail = async (snapshot) => {
      const thumbCanvas = document.createElement("canvas");
      thumbCanvas.width = 180;
      thumbCanvas.height = 180;
      const thumbCtx = thumbCanvas.getContext("2d");

      const renderable = await makeRenderableLayersFromSnapshot(snapshot);

      thumbCtx.clearRect(0, 0, thumbCanvas.width, thumbCanvas.height);
      thumbCtx.save();
      thumbCtx.scale(thumbCanvas.width / canvas.width, thumbCanvas.height / canvas.height);

      renderable.forEach((layer) => {
        thumbCtx.save();
        thumbCtx.translate(layer.x, layer.y);
        thumbCtx.rotate((layer.rotation * Math.PI) / 180);
        thumbCtx.scale(layer.flip ? -layer.scale : layer.scale, layer.scale);
        thumbCtx.drawImage(layer.img, -layer.w / 2, -layer.h / 2, layer.w, layer.h);
        thumbCtx.restore();
      });

      thumbCtx.restore();
      return thumbCanvas.toDataURL("image/png");
    };

    const renderPoseList = () => {
      poseList.innerHTML = "";

      poses.forEach((pose, idx) => {
        const row = document.createElement("div");
        row.className =
          "rounded-xl border p-2 " +
          (idx === selectedPoseIndex
            ? "border-emerald-400 bg-emerald-400/10"
            : "border-white/10 bg-zinc-950");

        const top = document.createElement("div");
        top.className = "flex items-center gap-2";

        const img = document.createElement("img");
        img.src = pose.thumb || "";
        img.className = "w-14 h-14 object-contain rounded-lg bg-black border border-white/10";

        const title = document.createElement("button");
        title.type = "button";
        title.className = "text-left text-xs text-zinc-200 truncate flex-1";
        title.textContent = pose.name;

        title.addEventListener("click", async () => {
          selectedPoseIndex = idx;
          await restoreLayersFromSnapshot(pose.layers);
          updateUI();
          setStatus(`Loaded ${pose.name}.`);
        });

        const del = document.createElement("button");
        del.type = "button";
        del.className = "text-xs text-red-300 px-2 py-1 rounded-lg border border-red-400/30 bg-red-400/10";
        del.textContent = "✕";
        del.addEventListener("click", () => {
          poses.splice(idx, 1);
          selectedPoseIndex = -1;
          renderPoseList();
          draw();
          setStatus("Pose deleted.");
        });

        const actions = document.createElement("div");
        actions.className = "grid grid-cols-3 gap-2 mt-2";

        const load = document.createElement("button");
        load.type = "button";
        load.className = "text-xs px-2 py-1 rounded-lg border border-white/10 bg-white/5";
        load.textContent = "Load";
        load.addEventListener("click", async () => {
          selectedPoseIndex = idx;
          await restoreLayersFromSnapshot(pose.layers);
          updateUI();
          setStatus(`Loaded ${pose.name}.`);
        });

        const ghost = document.createElement("button");
        ghost.type = "button";
        ghost.className = "text-xs px-2 py-1 rounded-lg border border-white/10 bg-white/5";
        ghost.textContent = "Ghost";
        ghost.addEventListener("click", () => {
          selectedPoseIndex = idx;
          onionToggle.checked = true;
          renderPoseList();
          draw();
          setStatus(`Onion skin set to ${pose.name}.`);
        });

        const exportOne = document.createElement("button");
        exportOne.type = "button";
        exportOne.className = "text-xs px-2 py-1 rounded-lg border border-white/10 bg-white/5";
        exportOne.textContent = "Export";
        exportOne.addEventListener("click", async () => {
          await exportPose(idx);
        });

        top.appendChild(img);
        top.appendChild(title);
        top.appendChild(del);
        actions.appendChild(load);
        actions.appendChild(ghost);
        actions.appendChild(exportOne);
        row.appendChild(top);
        row.appendChild(actions);
        poseList.appendChild(row);
      });
    };

    const updateUI = () => {
      syncControls();
      renderLayerList();
      renderPoseList();
      draw();
    };

    const loadFiles = async (files) => {
      const imageFiles = Array.from(files || []).filter((file) => (file.type || "").startsWith("image/"));

      if (!imageFiles.length) {
        setStatus("No valid image files selected.");
        return;
      }

      for (const file of imageFiles) {
        const src = await readFileAsDataURL(file);
        const img = await loadImageFromSrc(src);
        if (!img) continue;

        const maxSize = 260;
        const naturalW = img.naturalWidth || img.width;
        const naturalH = img.naturalHeight || img.height;
        const fit = Math.min(1, maxSize / Math.max(naturalW, naturalH));

        layers.push({
          name: file.name,
          img,
          src,
          x: canvas.width / 2,
          y: canvas.height / 2,
          w: Math.round(naturalW * fit),
          h: Math.round(naturalH * fit),
          scale: 1,
          rotation: 0,
          flip: false,
        });

        selectedIndex = layers.length - 1;
      }

      setStatus(`Loaded ${imageFiles.length} part(s).`);
      updateUI();
    };

    const hitTest = (x, y) => {
      for (let i = layers.length - 1; i >= 0; i--) {
        const layer = layers[i];
        const halfW = (layer.w * layer.scale) / 2;
        const halfH = (layer.h * layer.scale) / 2;

        if (x >= layer.x - halfW && x <= layer.x + halfW && y >= layer.y - halfH && y <= layer.y + halfH) {
          return i;
        }
      }
      return -1;
    };

    const pointerPos = (e) => {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height),
      };
    };

    const exportCurrentPose = (filename = null) => {
      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = canvas.width;
      exportCanvas.height = canvas.height;
      const exportCtx = exportCanvas.getContext("2d");

      drawLayersToContext(exportCtx, layers, false);

      const num = String(exportCounter).padStart(3, "0");
      const file = filename || `databyte-frame-${num}.png`;
      exportCounter += 1;

      downloadDataURL(file, exportCanvas.toDataURL("image/png"));
      setStatus(`Exported ${file}.`);
    };

    const exportPose = async (poseIndex) => {
      const pose = poses[poseIndex];
      if (!pose) return;

      const oldLayers = layers;
      const oldSelected = selectedIndex;

      await restoreLayersFromSnapshot(pose.layers);

      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = canvas.width;
      exportCanvas.height = canvas.height;
      const exportCtx = exportCanvas.getContext("2d");
      drawLayersToContext(exportCtx, layers, false);

      const num = String(poseIndex + 1).padStart(3, "0");
      downloadDataURL(`databyte-frame-${num}.png`, exportCanvas.toDataURL("image/png"));

      layers = oldLayers;
      selectedIndex = oldSelected;
      updateUI();
      setStatus(`Exported ${pose.name}.`);
    };

    const exportAllPoses = async () => {
      if (!poses.length) {
        setStatus("No poses saved yet.");
        return;
      }

      for (let i = 0; i < poses.length; i++) {
        await exportPose(i);
        await new Promise((r) => setTimeout(r, 250));
      }

      setStatus(`Exported ${poses.length} pose frame(s).`);
    };

    const savePose = async () => {
      if (!layers.length) {
        setStatus("Add layers before saving a pose.");
        return;
      }

      const n = poses.length + 1;
      const snapshot = getLayerSnapshot();
      const thumb = await createPoseThumbnail(snapshot);

      poses.push({
        name: `Pose ${String(n).padStart(2, "0")}`,
        layers: snapshot,
        thumb,
      });

      selectedPoseIndex = poses.length - 1;
      renderPoseList();
      draw();
      setStatus(`Saved Pose ${String(n).padStart(2, "0")}.`);
    };

    const saveProject = () => {
      const project = {
        app: "VoltanLabs Character Forge 2D",
        version: 3,
        canvas: { width: canvas.width, height: canvas.height },
        layers: getLayerSnapshot(),
        poses,
      };

      const stamp = new Date().toISOString().slice(0, 10);
      downloadTextFile(`voltan-character-project-${stamp}.json`, JSON.stringify(project, null, 2));
      setStatus("Project JSON saved.");
    };

    const repairPoseThumbs = async () => {
      for (let i = 0; i < poses.length; i++) {
        if (!poses[i].thumb) {
          poses[i].thumb = await createPoseThumbnail(poses[i].layers);
        }
      }
    };

    const loadProject = async (file) => {
      if (!file) return;

      try {
        const text = await file.text();
        const project = JSON.parse(text);

        if (!Array.isArray(project.layers)) {
          setStatus("Invalid project file.");
          return;
        }

        await restoreLayersFromSnapshot(project.layers);
        poses = Array.isArray(project.poses) ? project.poses : [];
        selectedPoseIndex = -1;

        await repairPoseThumbs();

        updateUI();
        setStatus(`Project loaded: ${layers.length} layer(s), ${poses.length} pose(s).`);
      } catch (err) {
        console.error(err);
        setStatus("Could not load project JSON.");
      }
    };

    canvas.addEventListener("pointerdown", (e) => {
      e.preventDefault();

      const pos = pointerPos(e);
      const idx = hitTest(pos.x, pos.y);

      selectedIndex = idx;

      if (idx >= 0) {
        const layer = layers[idx];
        dragging = true;
        dragOffsetX = pos.x - layer.x;
        dragOffsetY = pos.y - layer.y;
        canvas.setPointerCapture(e.pointerId);
      }

      updateUI();
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!dragging || selectedIndex < 0) return;
      e.preventDefault();

      const pos = pointerPos(e);
      const layer = getSelected();

      layer.x = pos.x - dragOffsetX;
      layer.y = pos.y - dragOffsetY;

      draw();
    });

    canvas.addEventListener("pointerup", () => dragging = false);
    canvas.addEventListener("pointercancel", () => dragging = false);

    partInput.addEventListener("change", async () => {
      await loadFiles(partInput.files);
      partInput.value = "";
    });

    loadProjectInput.addEventListener("change", async () => {
      await loadProject(loadProjectInput.files?.[0]);
      loadProjectInput.value = "";
    });

    saveProjectBtn.addEventListener("click", saveProject);
    savePoseBtn.addEventListener("click", savePose);
    exportAllPosesBtn.addEventListener("click", exportAllPoses);
    exportBtn.addEventListener("click", () => exportCurrentPose());

    onionToggle.addEventListener("change", () => draw());
    onionOpacity.addEventListener("input", () => draw());

    scaleInput.addEventListener("input", () => {
      const layer = getSelected();
      if (!layer) return;
      layer.scale = Math.max(0.1, parseInt(scaleInput.value, 10) / 100);
      draw();
    });

    rotateInput.addEventListener("input", () => {
      const layer = getSelected();
      if (!layer) return;
      layer.rotation = parseInt(rotateInput.value, 10) || 0;
      draw();
    });

    centerBtn.addEventListener("click", () => {
      const layer = getSelected();
      if (!layer) return;
      layer.x = canvas.width / 2;
      layer.y = canvas.height / 2;
      draw();
    });

    deleteBtn.addEventListener("click", () => {
      if (selectedIndex < 0) return;
      layers.splice(selectedIndex, 1);
      selectedIndex = layers.length ? Math.min(selectedIndex, layers.length - 1) : -1;
      updateUI();
      setStatus("Layer deleted.");
    });

    clearBtn.addEventListener("click", () => {
      layers = [];
      poses = [];
      selectedIndex = -1;
      selectedPoseIndex = -1;
      updateUI();
      setStatus("Cleared.");
    });

    flipBtn.addEventListener("click", () => {
      const layer = getSelected();
      if (!layer) return;
      layer.flip = !layer.flip;
      draw();
    });

    resetBtn.addEventListener("click", () => {
      const layer = getSelected();
      if (!layer) return;
      layer.scale = 1;
      layer.rotation = 0;
      layer.flip = false;
      syncControls();
      draw();
    });

    frontBtn.addEventListener("click", () => {
      if (selectedIndex < 0) return;
      const [layer] = layers.splice(selectedIndex, 1);
      layers.push(layer);
      selectedIndex = layers.length - 1;
      updateUI();
    });

    backBtn.addEventListener("click", () => {
      if (selectedIndex < 0) return;
      const [layer] = layers.splice(selectedIndex, 1);
      layers.unshift(layer);
      selectedIndex = 0;
      updateUI();
    });

    updateUI();
    setStatus("Ready.");
  </script>
</body>
</html>
