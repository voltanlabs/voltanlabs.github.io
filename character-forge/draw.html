<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Draw Parts — VoltanLabs</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      touch-action: none;
    }
  </style>
</head>

<body class="min-h-screen bg-zinc-950 text-zinc-100">
  <div id="vl-header"></div>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="mb-5">
      <a href="./index.html" class="text-sm text-fuchsia-300 hover:underline">← Back to Character Forge</a>
      <h1 class="text-3xl font-semibold mt-2">Draw Parts</h1>
      <p class="text-sm text-zinc-400 mt-2">
        Draw transparent PNG sprite parts with layers, opacity, references, brush, eraser, undo, and flattened export.
      </p>
      <div id="statusText" class="text-sm text-zinc-400 mt-2">Ready.</div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
      <section class="lg:col-span-3 rounded-2xl border border-white/10 bg-black/30 p-4">
        <div class="rounded-2xl border border-white/10 bg-zinc-900 overflow-auto">
          <canvas
            id="drawCanvas"
            width="900"
            height="900"
            class="mx-auto w-full max-w-[900px] rounded-2xl"
          ></canvas>
        </div>

        <div class="flex flex-wrap gap-2 mt-4">
          <button id="exportBtn" class="px-4 py-2 rounded-xl bg-fuchsia-400 text-zinc-950 font-semibold">
            Export PNG
          </button>

          <button id="undoBtn" class="px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">
            Undo
          </button>

          <button id="clearLayerBtn" class="px-4 py-2 rounded-xl border border-red-400/30 bg-red-400/10 text-red-200 hover:bg-red-400/20">
            Clear Layer
          </button>

          <button id="clearAllBtn" class="px-4 py-2 rounded-xl border border-red-400/30 bg-red-400/10 text-red-200 hover:bg-red-400/20">
            Clear All
          </button>

          <label class="px-4 py-2 rounded-xl bg-sky-400 text-zinc-950 font-semibold cursor-pointer">
            Import Reference
            <input id="referenceInput" type="file" accept="image/*" class="hidden" />
          </label>

          <button id="removeReferenceBtn" class="px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">
            Remove Reference
          </button>
        </div>
      </section>

      <aside class="lg:col-span-1 rounded-2xl border border-white/10 bg-black/30 p-4 space-y-5">
        <section>
          <h2 class="font-semibold mb-3">Brush</h2>

          <div class="space-y-3 text-sm">
            <label class="block text-zinc-400">
              Color
              <input id="colorInput" type="color" value="#38bdf8" class="w-full h-10 mt-1 rounded-xl bg-zinc-950 border border-white/10" />
            </label>

            <label class="block text-zinc-400">
              Size
              <input id="sizeInput" type="range" min="1" max="80" value="12" class="w-full mt-1" />
              <div class="text-xs text-zinc-500 mt-1"><span id="sizeText">12</span> px</div>
            </label>

            <label class="block text-zinc-400">
              Brush Opacity
              <input id="opacityInput" type="range" min="5" max="100" value="100" class="w-full mt-1" />
              <div class="text-xs text-zinc-500 mt-1"><span id="opacityText">100</span>%</div>
            </label>

            <div class="grid grid-cols-2 gap-2">
              <button id="brushBtn" class="px-3 py-2 rounded-xl bg-fuchsia-400 text-zinc-950 font-semibold">
                Brush
              </button>
              <button id="eraserBtn" class="px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">
                Eraser
              </button>
            </div>
          </div>
        </section>

        <section class="border-t border-white/10 pt-4">
          <h3 class="font-semibold mb-3">Layers</h3>

          <div class="grid grid-cols-2 gap-2 mb-3">
            <button id="addLayerBtn" class="px-3 py-2 rounded-xl bg-fuchsia-400 text-zinc-950 font-semibold text-sm">
              Add
            </button>
            <button id="duplicateLayerBtn" class="px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 text-sm">
              Duplicate
            </button>
            <button id="mergeDownBtn" class="px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 text-sm">
              Merge Down
            </button>
            <button id="deleteLayerBtn" class="px-3 py-2 rounded-xl border border-red-400/30 bg-red-400/10 text-red-200 text-sm">
              Delete
            </button>
          </div>

          <div class="grid grid-cols-2 gap-2 mb-3">
            <button id="moveLayerUpBtn" class="px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 text-sm">
              Up
            </button>
            <button id="moveLayerDownBtn" class="px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 text-sm">
              Down
            </button>
          </div>

          <div id="layerList" class="space-y-2 max-h-72 overflow-auto"></div>
        </section>

        <section class="border-t border-white/10 pt-4">
          <h3 class="font-semibold mb-3">Canvas</h3>

          <div class="grid grid-cols-2 gap-2">
            <button id="smallBtn" class="px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 text-sm">
              512
            </button>
            <button id="largeBtn" class="px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 text-sm">
              900
            </button>
          </div>

          <label class="flex items-center justify-between gap-2 text-xs text-zinc-300 rounded-xl border border-white/10 bg-zinc-950 px-3 py-2 mt-3">
            <span>Show Reference</span>
            <input id="showReferenceToggle" type="checkbox" checked class="accent-fuchsia-400" />
          </label>

          <label class="block text-xs text-zinc-400 mt-3">
            Reference Opacity
            <input id="referenceOpacity" type="range" min="5" max="100" value="35" class="w-full mt-1" />
          </label>
        </section>
      </aside>
    </div>
  </main>

  <div id="vl-footer"></div>
  <script src="/assets/includes.js"></script>

  <script>
    const canvas = document.getElementById("drawCanvas");
    const ctx = canvas.getContext("2d");

    const statusText = document.getElementById("statusText");
    const colorInput = document.getElementById("colorInput");
    const sizeInput = document.getElementById("sizeInput");
    const opacityInput = document.getElementById("opacityInput");
    const sizeText = document.getElementById("sizeText");
    const opacityText = document.getElementById("opacityText");

    const brushBtn = document.getElementById("brushBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const exportBtn = document.getElementById("exportBtn");
    const undoBtn = document.getElementById("undoBtn");
    const clearLayerBtn = document.getElementById("clearLayerBtn");
    const clearAllBtn = document.getElementById("clearAllBtn");

    const referenceInput = document.getElementById("referenceInput");
    const removeReferenceBtn = document.getElementById("removeReferenceBtn");
    const showReferenceToggle = document.getElementById("showReferenceToggle");
    const referenceOpacity = document.getElementById("referenceOpacity");

    const smallBtn = document.getElementById("smallBtn");
    const largeBtn = document.getElementById("largeBtn");

    const addLayerBtn = document.getElementById("addLayerBtn");
    const duplicateLayerBtn = document.getElementById("duplicateLayerBtn");
    const mergeDownBtn = document.getElementById("mergeDownBtn");
    const deleteLayerBtn = document.getElementById("deleteLayerBtn");
    const moveLayerUpBtn = document.getElementById("moveLayerUpBtn");
    const moveLayerDownBtn = document.getElementById("moveLayerDownBtn");
    const layerList = document.getElementById("layerList");

    let drawing = false;
    let lastX = 0;
    let lastY = 0;
    let tool = "brush";
    let undoStack = [];
    let referenceImg = null;

    let layers = [];
    let selectedLayerIndex = 0;
    let layerCounter = 1;

    const setStatus = (msg) => statusText.textContent = msg;

    const makeLayer = (name = null) => {
      const layerCanvas = document.createElement("canvas");
      layerCanvas.width = canvas.width;
      layerCanvas.height = canvas.height;

      return {
        name: name || `Layer ${layerCounter++}`,
        canvas: layerCanvas,
        visible: true,
        opacity: 1,
      };
    };

    const getActiveLayer = () => layers[selectedLayerIndex] || null;

    const compositeLayers = (targetCtx, includeReference = true) => {
      targetCtx.clearRect(0, 0, canvas.width, canvas.height);

      if (includeReference && referenceImg && showReferenceToggle.checked) {
        const alpha = Math.max(0.05, Math.min(1, Number(referenceOpacity.value) / 100));

        targetCtx.save();
        targetCtx.globalAlpha = alpha;

        const scale = Math.min(canvas.width / referenceImg.width, canvas.height / referenceImg.height);
        const w = referenceImg.width * scale;
        const h = referenceImg.height * scale;
        const x = (canvas.width - w) / 2;
        const y = (canvas.height - h) / 2;

        targetCtx.drawImage(referenceImg, x, y, w, h);
        targetCtx.restore();
      }

      layers.forEach((layer) => {
        if (!layer.visible) return;

        targetCtx.save();
        targetCtx.globalAlpha = layer.opacity ?? 1;
        targetCtx.drawImage(layer.canvas, 0, 0);
        targetCtx.restore();
      });
    };

    const redraw = () => {
      compositeLayers(ctx, true);
    };

    const renderLayerList = () => {
      layerList.innerHTML = "";

      [...layers].reverse().forEach((layer, reverseIdx) => {
        const idx = layers.length - 1 - reverseIdx;

        const row = document.createElement("div");
        row.className =
          "rounded-xl border p-2 " +
          (idx === selectedLayerIndex
            ? "border-fuchsia-400 bg-fuchsia-400/10"
            : "border-white/10 bg-zinc-950");

        const top = document.createElement("div");
        top.className = "flex items-center gap-2";

        const select = document.createElement("button");
        select.type = "button";
        select.className = "flex-1 text-left text-xs text-zinc-200 truncate";
        select.textContent = layer.name;
        select.addEventListener("click", () => {
          selectedLayerIndex = idx;
          renderLayerList();
          redraw();
          setStatus(`${layer.name} selected.`);
        });

        const vis = document.createElement("button");
        vis.type = "button";
        vis.className = "text-xs px-2 py-1 rounded-lg border border-white/10 bg-white/5";
        vis.textContent = layer.visible ? "👁" : "—";
        vis.title = "Toggle visibility";
        vis.addEventListener("click", () => {
          layer.visible = !layer.visible;
          renderLayerList();
          redraw();
        });

        const opacityLabel = document.createElement("label");
        opacityLabel.className = "block text-[11px] text-zinc-500 mt-2";
        opacityLabel.textContent = `Opacity ${Math.round((layer.opacity ?? 1) * 100)}%`;

        const opacitySlider = document.createElement("input");
        opacitySlider.type = "range";
        opacitySlider.min = "0";
        opacitySlider.max = "100";
        opacitySlider.value = Math.round((layer.opacity ?? 1) * 100);
        opacitySlider.className = "w-full mt-1 accent-fuchsia-400";
        opacitySlider.addEventListener("input", (e) => {
          e.stopPropagation();
          layer.opacity = Number(opacitySlider.value) / 100;
          opacityLabel.textContent = `Opacity ${opacitySlider.value}%`;
          redraw();
        });

        top.appendChild(select);
        top.appendChild(vis);

        row.appendChild(top);
        row.appendChild(opacityLabel);
        row.appendChild(opacitySlider);
        layerList.appendChild(row);
      });
    };

    const saveUndo = () => {
      const active = getActiveLayer();
      if (!active) return;

      try {
        undoStack.push({
          layerIndex: selectedLayerIndex,
          imageData: active.canvas.getContext("2d").getImageData(0, 0, canvas.width, canvas.height),
        });

        if (undoStack.length > 30) undoStack.shift();
      } catch (err) {
        console.warn("Undo save failed", err);
      }
    };

    const pointerPos = (e) => {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height),
      };
    };

    const drawLine = (x1, y1, x2, y2) => {
      const active = getActiveLayer();
      if (!active) return;

      const layerCtx = active.canvas.getContext("2d");

      layerCtx.save();
      layerCtx.lineCap = "round";
      layerCtx.lineJoin = "round";
      layerCtx.lineWidth = Number(sizeInput.value);
      layerCtx.globalAlpha = Number(opacityInput.value) / 100;

      if (tool === "eraser") {
        layerCtx.globalCompositeOperation = "destination-out";
        layerCtx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        layerCtx.globalCompositeOperation = "source-over";
        layerCtx.strokeStyle = colorInput.value;
      }

      layerCtx.beginPath();
      layerCtx.moveTo(x1, y1);
      layerCtx.lineTo(x2, y2);
      layerCtx.stroke();
      layerCtx.restore();

      redraw();
    };

    canvas.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const pos = pointerPos(e);

      saveUndo();

      drawing = true;
      lastX = pos.x;
      lastY = pos.y;

      canvas.setPointerCapture(e.pointerId);
      drawLine(lastX, lastY, pos.x + 0.1, pos.y + 0.1);
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!drawing) return;
      e.preventDefault();

      const pos = pointerPos(e);
      drawLine(lastX, lastY, pos.x, pos.y);

      lastX = pos.x;
      lastY = pos.y;
    });

    canvas.addEventListener("pointerup", () => drawing = false);
    canvas.addEventListener("pointercancel", () => drawing = false);

    brushBtn.addEventListener("click", () => {
      tool = "brush";
      brushBtn.className = "px-3 py-2 rounded-xl bg-fuchsia-400 text-zinc-950 font-semibold";
      eraserBtn.className = "px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10";
      setStatus("Brush selected.");
    });

    eraserBtn.addEventListener("click", () => {
      tool = "eraser";
      eraserBtn.className = "px-3 py-2 rounded-xl bg-fuchsia-400 text-zinc-950 font-semibold";
      brushBtn.className = "px-3 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10";
      setStatus("Eraser selected.");
    });

    sizeInput.addEventListener("input", () => sizeText.textContent = sizeInput.value);
    opacityInput.addEventListener("input", () => opacityText.textContent = opacityInput.value);

    undoBtn.addEventListener("click", () => {
      const last = undoStack.pop();

      if (!last || !layers[last.layerIndex]) {
        setStatus("Nothing to undo.");
        return;
      }

      const layerCtx = layers[last.layerIndex].canvas.getContext("2d");
      layerCtx.putImageData(last.imageData, 0, 0);

      selectedLayerIndex = last.layerIndex;
      renderLayerList();
      redraw();
      setStatus("Undo.");
    });

    clearLayerBtn.addEventListener("click", () => {
      const active = getActiveLayer();
      if (!active) return;

      saveUndo();
      active.canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
      redraw();
      setStatus("Layer cleared.");
    });

    clearAllBtn.addEventListener("click", () => {
      saveUndo();
      layers.forEach((layer) => {
        layer.canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
      });
      redraw();
      setStatus("All layers cleared.");
    });

    exportBtn.addEventListener("click", () => {
      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = canvas.width;
      exportCanvas.height = canvas.height;
      const exportCtx = exportCanvas.getContext("2d");

      compositeLayers(exportCtx, false);

      const a = document.createElement("a");
      a.href = exportCanvas.toDataURL("image/png");
      a.download = "databyte-part.png";
      a.click();

      setStatus("Flattened transparent PNG exported.");
    });

    referenceInput.addEventListener("change", () => {
      const file = referenceInput.files?.[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      const img = new Image();

      img.onload = () => {
        referenceImg = img;
        URL.revokeObjectURL(url);
        redraw();
        setStatus("Reference imported.");
      };

      img.onerror = () => {
        URL.revokeObjectURL(url);
        setStatus("Reference failed to load.");
      };

      img.src = url;
      referenceInput.value = "";
    });

    removeReferenceBtn.addEventListener("click", () => {
      referenceImg = null;
      redraw();
      setStatus("Reference removed.");
    });

    showReferenceToggle.addEventListener("change", redraw);
    referenceOpacity.addEventListener("input", redraw);

    addLayerBtn.addEventListener("click", () => {
      layers.push(makeLayer());
      selectedLayerIndex = layers.length - 1;
      renderLayerList();
      redraw();
      setStatus("Layer added.");
    });

    duplicateLayerBtn.addEventListener("click", () => {
      const active = getActiveLayer();
      if (!active) return;

      const copy = makeLayer(`${active.name} copy`);
      copy.visible = active.visible;
      copy.opacity = active.opacity ?? 1;
      copy.canvas.getContext("2d").drawImage(active.canvas, 0, 0);

      layers.splice(selectedLayerIndex + 1, 0, copy);
      selectedLayerIndex += 1;

      renderLayerList();
      redraw();
      setStatus("Layer duplicated.");
    });

    deleteLayerBtn.addEventListener("click", () => {
      if (layers.length <= 1) {
        setStatus("Keep at least one layer.");
        return;
      }

      layers.splice(selectedLayerIndex, 1);
      selectedLayerIndex = Math.min(selectedLayerIndex, layers.length - 1);

      renderLayerList();
      redraw();
      setStatus("Layer deleted.");
    });

    mergeDownBtn.addEventListener("click", () => {
      if (selectedLayerIndex <= 0) {
        setStatus("No layer below to merge into.");
        return;
      }

      const active = layers[selectedLayerIndex];
      const below = layers[selectedLayerIndex - 1];
      const belowCtx = below.canvas.getContext("2d");

      belowCtx.save();
      belowCtx.globalAlpha = active.opacity ?? 1;
      belowCtx.drawImage(active.canvas, 0, 0);
      belowCtx.restore();

      layers.splice(selectedLayerIndex, 1);
      selectedLayerIndex -= 1;

      renderLayerList();
      redraw();
      setStatus("Layer merged down.");
    });

    moveLayerUpBtn.addEventListener("click", () => {
      if (selectedLayerIndex >= layers.length - 1) return;

      const tmp = layers[selectedLayerIndex];
      layers[selectedLayerIndex] = layers[selectedLayerIndex + 1];
      layers[selectedLayerIndex + 1] = tmp;
      selectedLayerIndex += 1;

      renderLayerList();
      redraw();
    });

    moveLayerDownBtn.addEventListener("click", () => {
      if (selectedLayerIndex <= 0) return;

      const tmp = layers[selectedLayerIndex];
      layers[selectedLayerIndex] = layers[selectedLayerIndex - 1];
      layers[selectedLayerIndex - 1] = tmp;
      selectedLayerIndex -= 1;

      renderLayerList();
      redraw();
    });

    const resizeCanvas = (size) => {
      const oldLayers = layers.map((layer) => {
        const old = document.createElement("canvas");
        old.width = layer.canvas.width;
        old.height = layer.canvas.height;
        old.getContext("2d").drawImage(layer.canvas, 0, 0);
        return { ...layer, oldCanvas: old };
      });

      canvas.width = size;
      canvas.height = size;

      layers = oldLayers.map((layer) => {
        const resized = makeLayer(layer.name);
        resized.visible = layer.visible;
        resized.opacity = layer.opacity ?? 1;
        resized.canvas.getContext("2d").drawImage(layer.oldCanvas, 0, 0, size, size);
        return resized;
      });

      selectedLayerIndex = Math.min(selectedLayerIndex, layers.length - 1);
      renderLayerList();
      redraw();
      setStatus(`Canvas set to ${size}×${size}.`);
    };

    smallBtn.addEventListener("click", () => resizeCanvas(512));
    largeBtn.addEventListener("click", () => resizeCanvas(900));

    layers.push(makeLayer("Line Art"));
    selectedLayerIndex = 0;
    renderLayerList();
    redraw();
    setStatus("Ready.");
  </script>
</body>
</html>
