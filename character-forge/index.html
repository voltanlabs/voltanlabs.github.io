<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Character Forge (3D) — VoltanLabs</title>
  <meta name="description" content="Browser-based 3D character assembler (prototype) for VoltanLabs." />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body { height: 100%; }
    body { margin: 0; }
    #viewport { width: 100%; height: 540px; min-height: 540px; }
    canvas { display: block; }
  </style>
</head>

<body class="bg-zinc-950 text-zinc-100">
  <div id="vl-header"></div>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="mb-6">
      <div class="flex items-center gap-3 flex-wrap">
        <h1 class="text-3xl font-semibold">Character Forge (3D)</h1>
        <span class="text-[11px] px-3 py-1 rounded-full bg-sky-400/10 text-sky-200 border border-sky-200/40 tracking-wide uppercase">
          Prototype
        </span>
      </div>
      <p class="text-sm text-zinc-400 mt-2 max-w-2xl">
        Assemble a stylized anime character from modular GLB parts (DataByte style foundation).
      </p>
      <div id="status" class="text-sm text-zinc-400 mt-2">Idle.</div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
      <section class="lg:col-span-3 rounded-2xl border border-white/10 bg-black/30 overflow-hidden">
        <div id="viewport"></div>

        <div class="px-4 py-3 border-t border-white/10 flex flex-wrap gap-2 items-center justify-between">
          <div class="flex flex-wrap gap-2">
            <button id="resetViewBtn" class="px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">
              Reset View
            </button>
            <button id="reframeBtn" class="px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">
              Reframe
            </button>

            <label class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 cursor-pointer">
              <input id="uploadGlb" type="file" class="hidden" accept=".glb" />
              <span>Upload .glb (test)</span>
            </label>
          </div>

          <div class="flex items-center gap-3 text-sm text-zinc-300">
            <label class="flex items-center gap-2">
              <input id="autoRotateToggle" type="checkbox" class="accent-[#FFD700]" />
              Auto-rotate
            </label>
            <label class="flex items-center gap-2">
              <input id="wireframeToggle" type="checkbox" class="accent-[#FFD700]" />
              Wireframe
            </label>
          </div>
        </div>
      </section>

      <aside class="lg:col-span-1 rounded-2xl border border-white/10 bg-black/30 p-4">
        <div class="text-sm font-semibold mb-3">Parts</div>

        <div class="space-y-3 text-sm">
          <label class="flex items-center justify-between gap-3">
            <span class="text-zinc-300">Body</span>
            <input id="toggle_body" type="checkbox" checked class="accent-[#FFD700]" />
          </label>

          <label class="flex items-center justify-between gap-3">
            <span class="text-zinc-300">Head</span>
            <input id="toggle_head" type="checkbox" checked class="accent-[#FFD700]" />
          </label>

          <label class="flex items-center justify-between gap-3">
            <span class="text-zinc-300">Hair</span>
            <input id="toggle_hair" type="checkbox" checked class="accent-[#FFD700]" />
          </label>

          <label class="flex items-center justify-between gap-3">
            <span class="text-zinc-300">Top</span>
            <input id="toggle_top" type="checkbox" checked class="accent-[#FFD700]" />
          </label>

          <label class="flex items-center justify-between gap-3">
            <span class="text-zinc-300">Pants</span>
            <input id="toggle_pants" type="checkbox" checked class="accent-[#FFD700]" />
          </label>

          <label class="flex items-center justify-between gap-3">
            <span class="text-zinc-300">Shoes</span>
            <input id="toggle_shoes" type="checkbox" checked class="accent-[#FFD700]" />
          </label>

          <div class="pt-3 border-t border-white/10">
            <div class="text-xs text-zinc-400 mb-2">Swap variants</div>

            <label class="block text-xs text-zinc-400">
              Hair variant
              <select id="hairSelect" class="mt-1 w-full px-3 py-2 rounded-xl bg-zinc-950 border border-white/10 text-zinc-100">
                <option value="hair_01.glb">hair_01.glb</option>
              </select>
            </label>

            <label class="block text-xs text-zinc-400 mt-3">
              Top variant
              <select id="topSelect" class="mt-1 w-full px-3 py-2 rounded-xl bg-zinc-950 border border-white/10 text-zinc-100">
                <option value="top_01.glb">top_01.glb</option>
              </select>
            </label>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <div id="vl-footer"></div>
  <script src="/assets/includes.js"></script>

  <!-- Helpful: show the real error message on the page -->
  <script>
    window.addEventListener("error", (e) => {
      const el = document.getElementById("status");
      if (el) el.textContent = "JS Error: " + (e.message || e.error);
      console.log(e);
    });
    window.addEventListener("unhandledrejection", (e) => {
      const el = document.getElementById("status");
      if (el) el.textContent = "Promise Error: " + (e.reason?.message || e.reason);
      console.log(e);
    });
  </script>

  <!-- ✅ LOCAL MODULE THREE.JS (recommended) -->
  <script type="module">
    import * as THREE from "./vendor/three/build/three.module.js";
    import { OrbitControls } from "./vendor/three/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "./vendor/three/examples/jsm/loaders/GLTFLoader.js";

    const statusEl = document.getElementById("status");
    const viewport = document.getElementById("viewport");

    function setStatus(msg) {
      statusEl.textContent = msg;
      console.log("[Character Forge]", msg);
    }

    setStatus("Booting…");

    // Base path to your GLB parts folder (relative to /character-forge/index.html)
    const BASE_PATH = new URL("./assets/parts/", window.location.href).href;

    const PARTS = {
      body: "body_base.glb",
      head: "head_01.glb",
      hair: "hair_01.glb",
      top: "top_01.glb",
      pants: "pants_01.glb",
      shoes: "shoes_01.glb",
    };

    // Wait 1 frame so viewport has real size on mobile
    await new Promise(requestAnimationFrame);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    function resize() {
      const w = Math.max(1, viewport.clientWidth);
      const h = Math.max(1, viewport.clientHeight || 540);
      renderer.setSize(w, h, false);
      return { w, h };
    }

    const { w, h } = resize();
    viewport.innerHTML = "";
    viewport.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#070a12");

    const camera = new THREE.PerspectiveCamera(45, w / h, 0.01, 5000);
    camera.position.set(0, 1.4, 3.2);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.1, 0);
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x223355, 0.9));
    const key = new THREE.DirectionalLight(0xffffff, 1.4);
    key.position.set(3, 6, 3);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0x88ccff, 0.45);
    fill.position.set(-4, 3, -2);
    scene.add(fill);

    // ✅ Always-visible cube (proves renderer works)
    const testCube = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.35, 0.35),
      new THREE.MeshStandardMaterial({ color: 0x00ff66 })
    );
    testCube.position.set(0, 1.1, 0);
    scene.add(testCube);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(3, 64),
      new THREE.MeshStandardMaterial({ color: 0x0b1020, roughness: 0.95, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    const grid = new THREE.GridHelper(6, 18, 0x1f2a44, 0x101827);
    grid.position.y = 0.001;
    scene.add(grid);

    // Character container
    const characterRoot = new THREE.Group();
    const character = new THREE.Group();
    characterRoot.add(character);
    scene.add(characterRoot);

    const loaded = { body:null, head:null, hair:null, top:null, pants:null, shoes:null };
    const loader = new GLTFLoader();

    function applyWireframe(enabled) {
      character.traverse((obj) => {
        if (obj.isMesh && obj.material) {
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach((m) => (m.wireframe = enabled));
        }
      });
    }

    function applyToggles() {
      const map = [
        ["body","toggle_body"], ["head","toggle_head"], ["hair","toggle_hair"],
        ["top","toggle_top"], ["pants","toggle_pants"], ["shoes","toggle_shoes"],
      ];
      map.forEach(([slot, id]) => {
        const on = document.getElementById(id)?.checked ?? true;
        if (loaded[slot]) loaded[slot].visible = on;
      });
    }

    function reframeObject(obj) {
      obj.position.set(0, 0, 0);
      obj.updateMatrixWorld(true);

      const box = new THREE.Box3().setFromObject(obj);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      if (!isFinite(maxDim) || maxDim <= 0) return;

      obj.position.x -= center.x;
      obj.position.z -= center.z;
      obj.position.y -= box.min.y;

      const dist = maxDim * 1.9;
      camera.near = Math.max(0.01, maxDim / 200);
      camera.far = Math.max(2000, maxDim * 50);
      camera.updateProjectionMatrix();

      camera.position.set(0, maxDim * 0.7, dist);
      controls.target.set(0, maxDim * 0.55, 0);
      controls.update();
    }

    async function loadPart(slot, filename) {
      const url = BASE_PATH + filename;
      setStatus(`Loading ${slot}: ${filename} …`);

      try {
        const gltf = await loader.loadAsync(url);
        if (loaded[slot]) character.remove(loaded[slot]);
        loaded[slot] = gltf.scene;

        loaded[slot].position.set(0,0,0);
        loaded[slot].rotation.set(0,0,0);
        loaded[slot].scale.set(1,1,1);

        character.add(loaded[slot]);

        applyWireframe(document.getElementById("wireframeToggle")?.checked);
        applyToggles();
        reframeObject(characterRoot);

        setStatus(`Loaded ${slot}: ${filename}`);
      } catch (err) {
        console.error(err);
        setStatus(`FAILED ${slot}: ${filename} (check assets/parts path + console)`);
      }
    }

    // UI
    document.getElementById("resetViewBtn")?.addEventListener("click", () => {
      camera.position.set(0, 1.4, 3.2);
      controls.target.set(0, 1.1, 0);
      controls.update();
    });

    document.getElementById("reframeBtn")?.addEventListener("click", () => reframeObject(characterRoot));

    document.getElementById("autoRotateToggle")?.addEventListener("change", (e) => {
      controls.autoRotate = e.target.checked;
      controls.autoRotateSpeed = 1.0;
    });

    document.getElementById("wireframeToggle")?.addEventListener("change", (e) => applyWireframe(e.target.checked));

    ["toggle_body","toggle_head","toggle_hair","toggle_top","toggle_pants","toggle_shoes"]
      .forEach(id => document.getElementById(id)?.addEventListener("change", applyToggles));

    document.getElementById("hairSelect")?.addEventListener("change", (e) => loadPart("hair", e.target.value));
    document.getElementById("topSelect")?.addEventListener("change", (e) => loadPart("top", e.target.value));

    // Upload test (loads a single model into the character group)
    document.getElementById("uploadGlb")?.addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      const blobUrl = URL.createObjectURL(file);
      setStatus(`Loading upload: ${file.name} …`);

      try {
        const gltf = await loader.loadAsync(blobUrl);

        // clear assembled parts
        Object.keys(loaded).forEach((k) => {
          if (loaded[k]) character.remove(loaded[k]);
          loaded[k] = null;
        });

        character.add(gltf.scene);
        applyWireframe(document.getElementById("wireframeToggle")?.checked);
        reframeObject(characterRoot);

        setStatus(`Loaded upload: ${file.name}`);
      } catch (err) {
        console.error(err);
        setStatus(`FAILED upload: ${file.name} (see console)`);
      } finally {
        URL.revokeObjectURL(blobUrl);
        e.target.value = "";
      }
    });

    // Boot load
    await loadPart("body", PARTS.body);
    await loadPart("head", PARTS.head);
    await loadPart("hair", PARTS.hair);
    await loadPart("top", PARTS.top);
    await loadPart("pants", PARTS.pants);
    await loadPart("shoes", PARTS.shoes);

    setStatus("Ready. If you see the green cube, rendering is working.");

    window.addEventListener("resize", () => {
      const { w, h } = resize();
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    });

    function animate() {
      requestAnimationFrame(animate);
      testCube.rotation.y += 0.01;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
