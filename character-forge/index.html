<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Character Forge (3D) — VoltanLabs</title>
  <meta name="description" content="Browser-based 3D character sandbox (prototype) for VoltanLabs." />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body { height: 100%; }
    body { margin: 0; }
    canvas { display:block; }
  </style>
</head>

<body class="bg-zinc-950 text-zinc-100">
  <div id="vl-header"></div>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
      <div>
        <h1 class="text-2xl font-semibold">Character Forge (3D)</h1>
        <p class="text-sm text-zinc-400">
          Prototype: load a 3D character model, inspect it, and prep for posing/customization.
        </p>
        <div id="status" class="text-sm text-zinc-400 mt-2">Booting…</div>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <label class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 cursor-pointer">
          <input id="fileInput" type="file" class="hidden" accept=".glb,.gltf" />
          <span>Upload .glb/.gltf</span>
        </label>

        <button id="resetViewBtn"
          class="px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">
          Reset View
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
      <section class="lg:col-span-3 rounded-2xl border border-white/10 bg-black/30 overflow-hidden">
        <div id="viewport" class="w-full min-h-[520px]"></div>
      </section>

      <aside class="lg:col-span-1 rounded-2xl border border-white/10 bg-black/30 p-4">
        <div class="text-sm font-semibold mb-3">Quick Controls</div>

        <div class="space-y-3 text-sm">
          <label class="flex items-center justify-between gap-3">
            <span class="text-zinc-300">Wireframe</span>
            <input id="wireframeToggle" type="checkbox" class="accent-[#FFD700]" />
          </label>

          <label class="flex items-center justify-between gap-3">
            <span class="text-zinc-300">Auto-rotate</span>
            <input id="autoRotateToggle" type="checkbox" class="accent-[#FFD700]" />
          </label>

          <label class="block">
            <span class="text-zinc-300">Light intensity</span>
            <input id="lightSlider" type="range" min="0" max="3" step="0.05" value="1.2" class="w-full" />
          </label>

          <div class="pt-2 text-xs text-zinc-400 leading-relaxed">
            Tip: for uploads, <span class="text-zinc-200">.glb</span> works best (single file).
            Many <span class="text-zinc-200">.gltf</span> models need external texture files.
          </div>
        </div>
      </aside>
    </div>
  </main>

  <div id="vl-footer"></div>
  <script src="/assets/includes.js"></script>

  <script type="module">
    const statusEl = document.getElementById("status");
    const viewport = document.getElementById("viewport");

    function setStatus(msg) {
      if (statusEl) statusEl.textContent = msg;
      console.log("[Character Forge]", msg);
    }

    // Dynamic imports so we can show a clean error if CDN fails.
    let THREE, OrbitControls, GLTFLoader, DRACOLoader;

    try {
      setStatus("Loading 3D engine…");

      // Use a single CDN family for consistency (unpkg).
      THREE = await import("https://unpkg.com/three@0.160.0/build/three.module.js");
      ({ OrbitControls } = await import("https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"));
      ({ GLTFLoader } = await import("https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"));
      ({ DRACOLoader } = await import("https://unpkg.com/three@0.160.0/examples/jsm/loaders/DRACOLoader.js"));

      setStatus("Engine loaded. Ready.");
    } catch (err) {
      console.error(err);
      setStatus("Failed to load 3D engine files (CDN blocked/offline).");
      // Show a visible error card
      const box = document.createElement("div");
      box.className = "mt-3 rounded-2xl border border-red-500/30 bg-red-500/10 p-4 text-sm text-red-100";
      box.innerHTML = `
        <div class="font-semibold mb-1">3D Engine failed to load</div>
        <div class="text-red-100/80">This page couldn’t download Three.js / OrbitControls from the CDN.</div>
        <div class="text-xs text-red-100/70 mt-2">Open DevTools → Console for details.</div>
      `;
      statusEl?.parentElement?.appendChild(box);
      throw err;
    }

    // --- Three.js setup ---
    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    viewport.appendChild(renderer.domElement);

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#070a12");

    // Camera
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
    camera.position.set(0, 1.35, 3.2);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);
    controls.update();

    // Lights
    const hemi = new THREE.HemisphereLight(0xffffff, 0x223355, 0.6);
    scene.add(hemi);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(3, 6, 3);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x88ccff, 0.35);
    fillLight.position.set(-4, 3, -2);
    scene.add(fillLight);

    // Ground + grid
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(3, 64),
      new THREE.MeshStandardMaterial({ color: 0x0b1020, roughness: 0.9, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const grid = new THREE.GridHelper(6, 18, 0x1f2a44, 0x101827);
    grid.position.y = 0.001;
    scene.add(grid);

    // Model holder
    let currentModel = null;

    function clearModel() {
      if (!currentModel) return;
      scene.remove(currentModel);
      currentModel.traverse((obj) => {
        if (obj.isMesh) {
          obj.geometry?.dispose?.();
          if (Array.isArray(obj.material)) obj.material.forEach((m) => m.dispose?.());
          else obj.material?.dispose?.();
        }
      });
      currentModel = null;
    }

    function frameObject(obj) {
      obj.updateMatrixWorld(true);

      const box = new THREE.Box3().setFromObject(obj);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      if (!isFinite(maxDim) || maxDim <= 0) {
        setStatus("Model loaded, but it has no visible geometry.");
        return;
      }

      // Center at origin and sit on ground
      obj.position.sub(center);
      obj.position.y += size.y / 2;
      obj.updateMatrixWorld(true);

      const dist = maxDim * 1.8;
      camera.near = Math.max(0.01, maxDim / 200);
      camera.far = Math.max(2000, maxDim * 20);
      camera.updateProjectionMatrix();

      camera.position.set(0, maxDim * 0.65, dist);
      controls.target.set(0, maxDim * 0.55, 0);
      controls.update();
    }

    function setWireframe(enabled) {
      if (!currentModel) return;
      currentModel.traverse((obj) => {
        if (obj.isMesh && obj.material) {
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach((m) => (m.wireframe = enabled));
        }
      });
    }

    // GLTF Loader + DRACO
    const loader = new GLTFLoader();
    const dracoLoader = new DRACOLoader();
    // DRACO decoder files live here for jsm
    dracoLoader.setDecoderPath("https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/");
    loader.setDRACOLoader(dracoLoader);

    // Default model (optional)
    async function tryLoadDefault() {
      try {
        setStatus("Idle. (Upload a .glb/.gltf)");
        // If you add: /character-forge/assets/starter.glb
        // uncomment below to auto-load it:
        // setStatus("Loading default model…");
        // const gltf = await loader.loadAsync("/character-forge/assets/starter.glb");
        // clearModel();
        // currentModel = gltf.scene;
        // scene.add(currentModel);
        // frameObject(currentModel);
        // setWireframe(document.getElementById("wireframeToggle").checked);
        // setStatus("Default model loaded.");
      } catch {
        setStatus("Idle. (Upload a .glb/.gltf)");
      }
    }
    tryLoadDefault();

    // UI wiring
    document.getElementById("wireframeToggle").addEventListener("change", (e) => {
      setWireframe(e.target.checked);
    });

    document.getElementById("autoRotateToggle").addEventListener("change", (e) => {
      controls.autoRotate = e.target.checked;
      controls.autoRotateSpeed = 1.0;
    });

    document.getElementById("lightSlider").addEventListener("input", (e) => {
      keyLight.intensity = Number(e.target.value);
    });

    document.getElementById("resetViewBtn").addEventListener("click", () => {
      if (currentModel) frameObject(currentModel);
      else {
        camera.position.set(0, 1.35, 3.2);
        controls.target.set(0, 1.2, 0);
        controls.update();
      }
    });

    // Upload handler
    document.getElementById("fileInput").addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      const name = file.name.toLowerCase();
      if (!(name.endsWith(".glb") || name.endsWith(".gltf"))) {
        setStatus(`Unsupported file: ${file.name} (use .glb or .gltf)`);
        e.target.value = "";
        return;
      }

      setStatus(`Loading: ${file.name} …`);
      const url = URL.createObjectURL(file);

      loader.load(
        url,
        (gltf) => {
          clearModel();
          currentModel = gltf.scene;
          scene.add(currentModel);

          frameObject(currentModel);
          setWireframe(document.getElementById("wireframeToggle").checked);

          setStatus(`Loaded: ${file.name}`);
          URL.revokeObjectURL(url);
          e.target.value = "";
        },
        (xhr) => {
          if (xhr.total) {
            const pct = Math.round((xhr.loaded / xhr.total) * 100);
            setStatus(`Loading: ${file.name} (${pct}%)`);
          }
        },
        (err) => {
          console.error(err);
          setStatus(`Failed to load: ${file.name}. (Try .glb if this is .gltf)`);
          URL.revokeObjectURL(url);
          e.target.value = "";
        }
      );
    });

    // Resize (use ResizeObserver so it also works when header/footer changes height)
    function resizeToContainer() {
      const w = viewport.clientWidth;
      const h = viewport.clientHeight;
      if (w <= 0 || h <= 0) return;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    const ro = new ResizeObserver(resizeToContainer);
    ro.observe(viewport);
    window.addEventListener("resize", resizeToContainer);
    resizeToContainer();

    // Render loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
