<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Character Forge (3D) — VoltanLabs</title>
  <meta name="description" content="Browser-based 3D character sandbox (prototype) for VoltanLabs." />

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ✅ Model Viewer (usually not blocked like unpkg) -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    model-viewer {
      width: 100%;
      height: 520px;
      background: #070a12;
      border-radius: 16px;
    }
  </style>
</head>

<body class="bg-zinc-950 text-zinc-100">
  <div id="vl-header"></div>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
      <div>
        <h1 class="text-2xl font-semibold">Character Forge (3D)</h1>
        <p class="text-sm text-zinc-400">
          Prototype: load a 3D character model, inspect it, and prep for posing/customization.
        </p>
        <div id="status" class="text-sm text-zinc-400 mt-2">Idle. Upload a .glb to view.</div>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <label class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 cursor-pointer">
          <input id="fileInput" type="file" class="hidden" accept=".glb" />
          <span>Upload .glb</span>
        </label>

        <button id="resetViewBtn"
          class="px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">
          Reset View
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
      <section class="lg:col-span-3 rounded-2xl border border-white/10 bg-black/30 p-3">
        <model-viewer
          id="mv"
          camera-controls
          touch-action="pan-y"
          exposure="1"
          shadow-intensity="0.8"
          environment-image="neutral"
          alt="3D model preview"
        >
        </model-viewer>
      </section>

      <aside class="lg:col-span-1 rounded-2xl border border-white/10 bg-black/30 p-4">
        <div class="text-sm font-semibold mb-3">Quick Controls</div>

        <div class="space-y-3 text-sm">
          <label class="flex items-center justify-between gap-3">
            <span class="text-zinc-300">Auto-rotate</span>
            <input id="autoRotateToggle" type="checkbox" class="accent-[#FFD700]" />
          </label>

          <label class="block">
            <span class="text-zinc-300">Exposure</span>
            <input id="exposureSlider" type="range" min="0" max="2" step="0.05" value="1" class="w-full" />
          </label>

          <div class="pt-2 text-xs text-zinc-400 leading-relaxed">
            Note: for easiest uploads, use <span class="text-zinc-200">.glb</span> (single file).
          </div>
        </div>
      </aside>
    </div>
  </main>

  <div id="vl-footer"></div>
  <script src="/assets/includes.js"></script>

  <script>
    const statusEl = document.getElementById("status");
    const fileInput = document.getElementById("fileInput");
    const mv = document.getElementById("mv");
    const resetBtn = document.getElementById("resetViewBtn");
    const autoRotateToggle = document.getElementById("autoRotateToggle");
    const exposureSlider = document.getElementById("exposureSlider");

    let currentUrl = null;

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      if (!file.name.toLowerCase().endsWith(".glb")) {
        setStatus("Please upload a .glb file (single-file model).");
        e.target.value = "";
        return;
      }

      if (currentUrl) URL.revokeObjectURL(currentUrl);
      currentUrl = URL.createObjectURL(file);

      mv.src = currentUrl;
      setStatus(`Loaded: ${file.name}`);
      e.target.value = "";
    });

    resetBtn.addEventListener("click", () => {
      // reset camera
      mv.cameraOrbit = "0deg 75deg 3m";
      mv.fieldOfView = "30deg";
    });

    autoRotateToggle.addEventListener("change", (e) => {
      mv.autoRotate = e.target.checked;
    });

    exposureSlider.addEventListener("input", (e) => {
      mv.exposure = Number(e.target.value);
    });

    // default view
    mv.cameraOrbit = "0deg 75deg 3m";
    mv.fieldOfView = "30deg";
  </script>
</body>
</html>
