<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Character Forge (3D) — VoltanLabs</title>
  <meta name="description" content="Browser-based 3D character sandbox (prototype) for VoltanLabs." />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body { height: 100%; }
    body { margin: 0; }
    canvas { display: block; }
  </style>
</head>

<body class="bg-zinc-950 text-zinc-100">
  <div id="vl-header"></div>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
      <div>
        <h1 class="text-2xl font-semibold">Character Forge (3D)</h1>
        <p class="text-sm text-zinc-400">
          Prototype: load a 3D character model, inspect it, and prep for posing/customization.
        </p>
        <div id="status" class="text-sm text-zinc-400 mt-2">Booting…</div>

        <!-- On-screen error log (mobile-friendly) -->
        <div id="log"
             class="mt-3 hidden text-xs whitespace-pre-wrap rounded-xl border border-red-500/30 bg-red-500/10 p-3 text-red-200">
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <label class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 cursor-pointer">
          <input id="fileInput" type="file" class="hidden" accept=".glb,.gltf" />
          <span>Upload .glb/.gltf</span>
        </label>

        <button id="resetViewBtn"
          class="px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10">
          Reset View
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
      <section class="lg:col-span-3 rounded-2xl border border-white/10 bg-black/30 overflow-hidden">
        <!-- IMPORTANT: force a real height -->
        <div id="viewport" style="height:60vh; min-height:520px;"></div>
      </section>

      <aside class="lg:col-span-1 rounded-2xl border border-white/10 bg-black/30 p-4">
        <div class="text-sm font-semibold mb-3">Quick Controls</div>

        <div class="space-y-3 text-sm">
          <label class="flex items-center justify-between gap-3">
            <span class="text-zinc-300">Wireframe</span>
            <input id="wireframeToggle" type="checkbox" class="accent-[#FFD700]" />
          </label>

          <label class="flex items-center justify-between gap-3">
            <span class="text-zinc-300">Auto-rotate</span>
            <input id="autoRotateToggle" type="checkbox" class="accent-[#FFD700]" />
          </label>

          <label class="block">
            <span class="text-zinc-300">Light intensity</span>
            <input id="lightSlider" type="range" min="0" max="3" step="0.05" value="1.2" class="w-full" />
          </label>

          <div class="pt-2 text-xs text-zinc-400 leading-relaxed">
            Next upgrades: VRM posing, morph sliders (face/body), outfit/texture swaps, export pose.
          </div>
        </div>
      </aside>
    </div>
  </main>

  <div id="vl-footer"></div>
  <script src="/assets/includes.js"></script>

  <!-- ✅ NON-MODULE Three.js (more reliable on mobile) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/DRACOLoader.js"></script>

  <script>
    const viewport = document.getElementById("viewport");
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");

    function setStatus(msg) {
      statusEl.textContent = msg;
      console.log("[Character Forge]", msg);
    }

    function logError(msg) {
      logEl.classList.remove("hidden");
      logEl.textContent += msg + "\n";
      console.error(msg);
    }

    window.addEventListener("error", (e) => logError("JS Error: " + (e.message || e.error || "Unknown")));
    window.addEventListener("unhandledrejection", (e) => logError("Promise Rejection: " + (e.reason || "Unknown")));

    // Sanity check: libraries loaded?
    if (!window.THREE) {
      setStatus("THREE failed to load.");
      logError("THREE is missing. CDN blocked or script failed to load.");
      throw new Error("THREE missing");
    }

    // --- sizing helper ---
    function getSize() {
      const w = Math.max(1, viewport.clientWidth || 1);
      const h = Math.max(520, viewport.clientHeight || 520);
      return { w, h };
    }

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.setClearColor(0x070a12, 1);

    const { w: startW, h: startH } = getSize();
    renderer.setSize(startW, startH);
    renderer.domElement.style.width = "100%";
    renderer.domElement.style.height = "100%";
    viewport.appendChild(renderer.domElement);

    // Scene
    const scene = new THREE.Scene();

    // Camera
    const camera = new THREE.PerspectiveCamera(45, startW / startH, 0.1, 2000);
    camera.position.set(0, 1.35, 3.2);

    // Controls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);
    controls.update();

    // Lights
    const hemi = new THREE.HemisphereLight(0xffffff, 0x223355, 0.8);
    scene.add(hemi);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(3, 6, 3);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x88ccff, 0.35);
    fillLight.position.set(-4, 3, -2);
    scene.add(fillLight);

    // Ground + grid (visible reference)
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(3, 64),
      new THREE.MeshStandardMaterial({ color: 0x0b1020, roughness: 0.95, metalness: 0 })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    const grid = new THREE.GridHelper(6, 18, 0x1f2a44, 0x101827);
    grid.position.y = 0.001;
    scene.add(grid);

    // ✅ Test cube so you ALWAYS see something if renderer is working
    const testCube = new THREE.Mesh(
      new THREE.BoxGeometry(0.4, 0.4, 0.4),
      new THREE.MeshStandardMaterial({ color: 0x00a0ff, roughness: 0.35, metalness: 0.2 })
    );
    testCube.position.set(0, 1.0, 0);
    scene.add(testCube);

    const axes = new THREE.AxesHelper(1.25);
    axes.position.set(0, 0.01, 0);
    scene.add(axes);

    // Model holder
    let currentModel = null;

    function clearModel() {
      if (!currentModel) return;
      scene.remove(currentModel);
      currentModel.traverse((obj) => {
        if (obj.isMesh) {
          if (obj.geometry) obj.geometry.dispose();
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach((m) => m && m.dispose && m.dispose());
        }
      });
      currentModel = null;
    }

    function frameObject(obj) {
      obj.updateMatrixWorld(true);

      const box = new THREE.Box3().setFromObject(obj);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      if (!isFinite(maxDim) || maxDim <= 0) {
        setStatus("Model loaded but has no visible bounds.");
        return;
      }

      // Center and put on ground
      obj.position.sub(center);
      obj.position.y += size.y / 2;
      obj.updateMatrixWorld(true);

      const dist = maxDim * 1.8;
      camera.near = Math.max(0.01, maxDim / 200);
      camera.far = Math.max(2000, maxDim * 20);
      camera.updateProjectionMatrix();

      camera.position.set(0, maxDim * 0.65, dist);
      controls.target.set(0, maxDim * 0.55, 0);
      controls.update();
    }

    function setWireframe(enabled) {
      if (!currentModel) return;
      currentModel.traverse((obj) => {
        if (obj.isMesh && obj.material) {
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach((m) => { m.wireframe = enabled; });
        }
      });
    }

    // GLTF loader + DRACO
    const loader = new THREE.GLTFLoader();
    const dracoLoader = new THREE.DRACOLoader();
    // ✅ examples/js uses THIS path:
    dracoLoader.setDecoderPath("https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/libs/draco/");
    loader.setDRACOLoader(dracoLoader);

    async function tryLoadDefault() {
      // Optional: only works if you actually have this file on your site
      const url = "/character-forge/assets/starter.glb";
      setStatus("Viewer ready. (Test cube should be visible)");
      // No auto-load by default; uncomment if you add starter.glb
      // loader.load(url, (gltf) => {
      //   clearModel();
      //   currentModel = gltf.scene;
      //   scene.add(currentModel);
      //   frameObject(currentModel);
      //   setStatus("Default model loaded.");
      // }, undefined, (err) => {
      //   setStatus("Viewer ready. (No default model)");
      // });
    }
    tryLoadDefault();

    // UI wiring
    document.getElementById("wireframeToggle").addEventListener("change", (e) => {
      setWireframe(e.target.checked);
    });

    document.getElementById("autoRotateToggle").addEventListener("change", (e) => {
      controls.autoRotate = e.target.checked;
      controls.autoRotateSpeed = 1.0;
    });

    document.getElementById("lightSlider").addEventListener("input", (e) => {
      keyLight.intensity = Number(e.target.value);
    });

    document.getElementById("resetViewBtn").addEventListener("click", () => {
      if (currentModel) frameObject(currentModel);
      else {
        camera.position.set(0, 1.35, 3.2);
        controls.target.set(0, 1.2, 0);
        controls.update();
      }
    });

    document.getElementById("fileInput").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      const lower = file.name.toLowerCase();
      if (!(lower.endsWith(".glb") || lower.endsWith(".gltf"))) {
        setStatus("Unsupported file type. Use .glb or .gltf");
        e.target.value = "";
        return;
      }

      setStatus("Loading: " + file.name + " …");
      const blobUrl = URL.createObjectURL(file);

      loader.load(
        blobUrl,
        (gltf) => {
          clearModel();
          currentModel = gltf.scene;

          // Hide test cube once a model loads (optional)
          testCube.visible = false;

          scene.add(currentModel);
          frameObject(currentModel);
          setWireframe(document.getElementById("wireframeToggle").checked);

          setStatus("Loaded: " + file.name);
          URL.revokeObjectURL(blobUrl);
          e.target.value = "";
        },
        undefined,
        (err) => {
          logError("GLTF load failed: " + (err && err.message ? err.message : String(err)));
          setStatus("Failed to load model.");
          URL.revokeObjectURL(blobUrl);
          e.target.value = "";
        }
      );
    });

    function onResize() {
      const { w, h } = getSize();
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener("resize", onResize);
    requestAnimationFrame(onResize);
    setTimeout(onResize, 50);

    function animate() {
      requestAnimationFrame(animate);
      testCube.rotation.y += 0.01; // visible proof it’s rendering
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
