<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Runtime Visualizer - VoltanLabs Studio</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#1A1A1A] text-white min-h-screen">
  <main class="max-w-6xl mx-auto px-6 py-12">
    <p class="text-[#FFD700] uppercase tracking-[0.25em] text-xs mb-3">VoltanLabs Studio</p><h1 class="text-4xl md:text-6xl font-bold text-[#007BFF]">Runtime Visualizer</h1><p class="text-gray-300 mt-4 max-w-3xl">Manifest-driven view of Data Discovery boot phases, runtime modules, dependencies, and failure behavior.</p><div class="mt-6 flex gap-3 flex-wrap"><a href="/studio/" class="px-4 py-2 rounded-xl bg-[#007BFF] font-bold">Back to Studio</a><a href="/studio/diagnostics/" class="px-4 py-2 rounded-xl border border-[#FFD700] text-[#FFD700] font-bold">Diagnostics</a></div><section id="runtimeOutput" class="grid gap-5 mt-10"></section>
  </main>
  <script>
    async function init(){const output=document.getElementById('runtimeOutput');try{const response=await fetch('/studio/runtime/load-order.json',{cache:'no-store'});if(!response.ok)throw new Error('missing manifest');const manifest=await response.json();const phases=(manifest.phases||[]).map(p=>`<article class="rounded-2xl border border-white/10 bg-[#2C3E50] p-5"><p class="text-[#FFD700] text-xs uppercase tracking-wide">Phase</p><h2 class="text-xl font-bold mt-1">${p.id}</h2><p class="text-gray-300 mt-2">${p.description}</p></article>`).join('');const modules=(manifest.modules||[]).map(m=>`<article class="rounded-2xl border border-white/10 bg-black/25 p-5"><p class="text-[#FFD700] text-xs uppercase tracking-wide">${m.phase}</p><h2 class="text-xl font-bold mt-1">${m.label}</h2><p class="text-gray-300 text-sm mt-3">${m.script}</p><p class="text-gray-400 text-xs mt-3">Requires: ${(m.requires||[]).join(' • ')||'none'}</p><p class="text-gray-400 text-xs mt-1">Failure: ${m.failureBehavior}</p></article>`).join('');output.innerHTML=`<section><h2 class="text-2xl font-bold mb-4">Boot Phases</h2><div class="grid md:grid-cols-2 gap-4">${phases}</div></section><section><h2 class="text-2xl font-bold mb-4 mt-8">Runtime Modules</h2><div class="grid md:grid-cols-2 gap-4">${modules}</div></section>`;}catch(e){output.innerHTML='<p class="text-yellow-200">Runtime manifest is not published to main yet. The visualizer page is live.</p>';}}init();
  </script>
</body></html>
