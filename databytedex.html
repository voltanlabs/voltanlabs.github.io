<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataByteDex - VoltanLabs</title>
  <meta name="description" content="The shared DataByteDex roster for DataByteSprites, powered by the Data Discovery game-data pipeline." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto&display=swap" rel="stylesheet">
  <style>body{font-family:Roboto,sans-serif}h1,h2,h3{font-family:Orbitron,sans-serif}</style>
</head>
<body class="bg-[#1A1A1A] text-white min-h-screen">
  <div id="vl-header"></div>
  <main>
    <section class="py-16 text-center bg-gradient-to-b from-[#2C3E50] to-[#1A1A1A] px-6">
      <p class="text-[#FFD700] uppercase tracking-[0.3em] text-xs mb-4">VoltArcade Shared Database</p>
      <h1 class="text-5xl md:text-7xl font-bold text-[#007BFF] mb-5">DataByteDex</h1>
      <p class="text-gray-300 text-lg max-w-3xl mx-auto">The shared roster for DataByteSprites. This page now consumes the same runtime roster bridge used by Data Discovery.</p>
      <div class="mt-6 flex flex-wrap gap-3 justify-center"><a href="/databyte-discovery.html" class="px-5 py-3 rounded-xl bg-[#007BFF] hover:bg-[#005FCC] font-bold">Play Data Discovery</a><a href="/voltarcade.html" class="px-5 py-3 rounded-xl border border-white hover:bg-white hover:text-[#1A1A1A] font-bold">Back to VoltArcade</a></div>
    </section>
    <section class="max-w-7xl mx-auto px-6 pb-20">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-[#2C3E50] rounded-2xl p-5 border border-white/10"><div class="text-sm text-gray-300">Canon Entries</div><div id="totalCount" class="text-3xl font-bold text-[#FFD700]">0</div></div>
        <div class="bg-[#2C3E50] rounded-2xl p-5 border border-white/10"><div class="text-sm text-gray-300">Seen</div><div id="seenCount" class="text-3xl font-bold text-[#FFD700]">0</div></div>
        <div class="bg-[#2C3E50] rounded-2xl p-5 border border-white/10"><div class="text-sm text-gray-300">Captured</div><div id="capturedCount" class="text-3xl font-bold text-[#FFD700]">0</div></div>
        <div class="bg-[#2C3E50] rounded-2xl p-5 border border-white/10"><div class="text-sm text-gray-300">Current Source</div><div id="dexSource" class="text-3xl font-bold text-[#FFD700]">Loading</div></div>
      </div>
      <div class="bg-[#2C3E50] rounded-3xl border border-white/10 p-5 mb-8">
        <label for="dexSearch" class="block text-sm text-gray-300 mb-2">Search DataByteDex</label>
        <input id="dexSearch" class="w-full px-4 py-4 rounded-2xl bg-black/30 border border-white/15 text-white outline-none focus:border-[#FFD700]" placeholder="Search by name, number, type, rarity, or Studio ID..." />
      </div>
      <div id="dexGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
    </section>
  </main>
  <div id="vl-footer"></div>
  <script src="/assets/includes.js"></script>
  <script src="/assets/js/dd-canon-roster.js?v=product-roster-1"></script>
  <script src="/assets/js/dd-studio-data-bridge.js?v=studio-bridge-2"></script>
  <script src="/assets/js/databytedex-shared-renderer.js?v=shared-dex-1"></script>
</body>
</html>
